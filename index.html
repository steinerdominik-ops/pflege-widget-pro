<script>

/* UI */
function openWidget(){
widget.style.display="flex";
openBtn.style.display="none";
}
function closeWidget(){
widget.style.display="none";
openBtn.style.display="block";
}

/* ================= GENERATE ================= */
async function generate(){

let raw = input.value.toLowerCase();

let s1=[], s2=[], s3=[];
let risks=new Set();

/* Zustand */
if(raw.includes("schlecht")){
s1.push("Der Allgemeinzustand zeigte sich deutlich reduziert");
risks.add("kritisch");
}
if(raw.includes("verwirrt") || raw.includes("komisch")){
s1.push("wirkte desorientiert");
}

/* Mobilität */
if(raw.includes("läuft") || raw.includes("unruhig")){
s1.push("motorisch unruhig");
risks.add("Sturzrisiko");
}
if(raw.includes("weglaufen")){
s1.push("Weglauftendenz vorhanden");
risks.add("Eigengefährdung");
}

/* Ernährung */
if(raw.includes("trinkt nicht")){
s2.push("Flüssigkeitsaufnahme verweigert");
risks.add("Dehydratation");
}

/* Ausscheidung */
if(raw.includes("stuhl") && raw.includes("verschmiert")){
s2.push("Stuhlkontamination festgestellt");
}

/* TEXT */
let localText="";

if(s1.length) localText+=s1.join(", ")+". ";
if(s2.length) localText+=s2.join(", ")+". ";
if(risks.size) localText+="Risiken: "+[...risks].join(", ")+".";
if(!localText) localText="Keine relevanten Auffälligkeiten.";

/* sofort anzeigen */
output.value = localText;

/* ===== KI ===== */
let ai = await hfAI(raw);

if(ai && ai.length > localText.length){
output.value = ai;
}

}

/* ================= KI ================= */
async function hfAI(text){

try{
let res = await fetch(
"https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct",
{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs: `
Schreibe einen professionellen Pflegebericht:
- sachlich
- Fachsprache
- mehrere Sätze
- Risiken

Text:
${text}
`
})
});

let data = await res.json();

if(Array.isArray(data)){
return data[0]?.generated_text;
}

}catch(e){
return null;
}

}

/* COPY */
function copyText(){
navigator.clipboard.writeText(output.value);
alert("Bericht kopiert");
}

/* RESET */
function resetAll(){
input.value="";
output.value="";
}

/* DRAG */
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=widget.offsetLeft - e.clientX;
offsetY=widget.offsetTop - e.clientY;
});

document.addEventListener("mouseup",()=>isDown=false);

document.addEventListener("mousemove",function(e){
if(!isDown) return;
widget.style.left=(e.clientX + offsetX)+"px";
widget.style.top=(e.clientY + offsetY)+"px";
widget.style.bottom="auto";
widget.style.right="auto";
});

</script>
