<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Digitale Pflegeassistenz</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
#openBtn{position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;}
#widget{
position:fixed;bottom:20px;right:20px;width:520px;height:640px;
background:white;border-radius:12px;box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;flex-direction:column;
}
.header{background:#0f4c81;color:white;padding:12px;display:flex;justify-content:space-between;cursor:move;}
.content{padding:12px;flex:1;overflow:auto;}
textarea{width:100%;height:140px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header" id="dragHeader">
<span>JennAI – Digitale Pflegeassistenz</span>
<span onclick="closeWidget()" style="cursor:pointer;">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* ================= UI ================= */
function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

/* ================= ENGINE ================= */
function generate(){

let t = input.value.toLowerCase();

function has(...arr){
return arr.some(a=>t.includes(a));
}

let findings=[];
let risks=new Set();

/* ===== ZUSTAND ===== */
if(has("az schlecht","kritisch","mies","sehr schlecht","extrem schwach","sehr schwach")){
findings.push({text:"Allgemeinzustand deutlich reduziert",prio:1});
risks.add("hoch");
}
else if(has("reduziert","schwach")){
findings.push({text:"Allgemeinzustand reduziert",prio:2});
}
else if(has("stabil","gut")){
findings.push({text:"Allgemeinzustand stabil",prio:3});
}

/* ===== TRINKEN ===== */
if(has("trinkt nicht","verweigert trinken","nimmt nichts an","kaum getrunken","nichts getrunken","keine flüssigkeit")){
findings.push({text:"Flüssigkeitsaufnahme verweigert",prio:1});
risks.add("dehydratation");
}
else if(has("wenig getrunken")){
findings.push({text:"Trinkmenge reduziert",prio:2});
risks.add("dehydratation");
}

/* ===== ESSEN ===== */
if(has("isst nicht","nicht gegessen","verweigert essen","nimmt nichts an","kein appetit")){
findings.push({text:"Nahrungsaufnahme nicht erfolgt",prio:1});
risks.add("mangelernährung");
}
else if(has("wenig gegessen")){
findings.push({text:"Nahrungsaufnahme reduziert",prio:2});
}

/* ===== STUHL ===== */
if(has("stuhl verschmiert","eingekotet","stuhl überall","stuhl im bett","stuhl in kleidung","stuhlreste")){
findings.push({text:"Stuhlkontamination festgestellt",prio:1});
risks.add("haut");
}

/* ===== HARN ===== */
if(has("eingenässt","alles nass","urin überall","hose nass","bett nass")){
findings.push({text:"Harnkontamination festgestellt",prio:1});
risks.add("haut");
}

/* ===== MOBILITÄT ===== */
if(has("unsicher","wackelig","fast gestürzt","beinahe gefallen")){
findings.push({text:"erhöhtes Sturzrisiko",prio:2});
risks.add("sturz");
}
if(has("bettlägerig","kommt nicht hoch","bleibt liegen")){
findings.push({text:"überwiegend bettlägerig",prio:2});
risks.add("dekubitus");
}

/* ===== VERHALTEN ===== */
if(has("verwirrt","komisch drauf","anders als sonst","durcheinander","nicht wie sonst")){
findings.push({text:"wirkte desorientiert",prio:2});
risks.add("sturz");
}
if(has("unruhig","läuft herum","zappelig","ruhelos")){
findings.push({text:"motorisch unruhig",prio:2});
}

/* ===== ATMUNG ===== */
if(has("atemnot","bekommt schlecht luft","luftnot","kurzatmig")){
findings.push({text:"Atemnot",prio:1});
risks.add("akut");
}
if(has("husten")){
findings.push({text:"Husten",prio:3});
}

/* ===== HAUT ===== */
if(has("wunde","offene stelle","haut offen")){
findings.push({text:"Wunde vorhanden",prio:1});
risks.add("infektion");
}
if(has("rötung","rot","gerötet")){
findings.push({text:"Rötung beobachtet",prio:2});
risks.add("dekubitus");
}

/* ===== SCHMERZ ===== */
if(has("schmerzen","aua","tut weh","jammert","klagt")){
findings.push({text:"Schmerzen angegeben",prio:2});
}

/* ===== SCHLAF ===== */
if(has("schlecht geschlafen","oft wach","mehrfach wach")){
findings.push({text:"Nachtruhe gestört",prio:3});
}

/* ===== MEDIKATION ===== */
if(has("medikamente","tabletten","medis")){
findings.push({text:"Medikation verabreicht",prio:3});
}

/* ================= PRIORITÄT ================= */
findings.sort((a,b)=>a.prio-b.prio);

/* ================= TEXT ================= */
let parts=[...new Set(findings.map(f=>f.text))];

let text="";

if(parts.length){
text=parts[0];
for(let i=1;i<parts.length;i++){
text+=(i===parts.length-1?" und ":", ")+parts[i];
}
text+=".";
}else{
text="Keine relevanten Auffälligkeiten.";
}

/* ================= RISIKEN ================= */
if(risks.size){
text+=" Risiken: "+[...risks].join(", ")+".";
}

/* ================= KI FEELING ================= */
if(has("komisch drauf","nicht wie sonst","anders als sonst")){
text+=" Verhalten im Vergleich zu sonst verändert.";
}

/* OUTPUT */
output.value = text.charAt(0).toUpperCase()+text.slice(1);
}

/* ================= COPY ================= */
function copyText(){
navigator.clipboard.writeText(output.value);
alert("Bericht kopiert");
}

/* ================= RESET ================= */
function resetAll(){
input.value="";
output.value="";
}

/* ================= DRAG ================= */
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=widget.offsetLeft - e.clientX;
offsetY=widget.offsetTop - e.clientY;
});
document.addEventListener("mouseup",()=>isDown=false);
document.addEventListener("mousemove",function(e){
if(!isDown) return;
widget.style.left=(e.clientX + offsetX)+"px";
widget.style.top=(e.clientY + offsetY)+"px";
widget.style.bottom="auto";
widget.style.right="auto";
});

</script>

</body>
</html>
