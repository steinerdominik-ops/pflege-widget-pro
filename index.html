<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Digitale Pflegeassistenz</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

#openBtn{
position:fixed;
bottom:20px;
right:20px;
font-size:48px;
cursor:pointer;
animation: float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

#widget{
position:fixed;
bottom:20px;
right:20px;
width:520px;
height:620px;
background:white;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
overflow:hidden;
}

.header{
background:#0f4c81;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
cursor:move;
font-weight:bold;
}

.content{
padding:12px;
flex:1;
overflow:auto;
}

textarea{
width:100%;
height:140px;
margin-top:8px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header" id="dragHeader">
<span>JennAI – Digitale Pflegeassistenz</span>
<span onclick="closeWidget()" style="cursor:pointer;">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* ================= OPEN ================= */
function openWidget(){
document.getElementById("widget").style.display="flex";
document.getElementById("openBtn").style.display="none";
}

function closeWidget(){
document.getElementById("widget").style.display="none";
document.getElementById("openBtn").style.display="block";
}

/* ================= GENERATOR ================= */
function generate(){

let input=document.getElementById("input").value.toLowerCase();

let r=[];
r.push("Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen betreut.");

/* ================= ALLGEMEINZUSTAND ================= */
if(/\bstark reduziert\b/.test(input))
r.push("Der Allgemeinzustand zeigte sich stark reduziert.");
else if(/\breduziert\b/.test(input))
r.push("Der Allgemeinzustand zeigte sich reduziert.");
else if(/\bstabil\b/.test(input))
r.push("Der Allgemeinzustand zeigte sich stabil.");

/* ================= ORIENTIERUNG ================= */
if(/\bdesorientiert|verwirrt\b/.test(input))
r.push("Bewohner/in zeigte sich desorientiert.");
else if(/\borientiert\b/.test(input))
r.push("Bewohner/in war orientiert.");

/* ================= KÖRPERPFLEGE ================= */
if(/dusche|duschen/.test(input) && /nicht|verweigert/.test(input))
r.push("Die angebotene Körperpflege wurde nicht angenommen.");
else if(/dusche|duschen|gewaschen/.test(input))
r.push("Die Körperpflege wurde durchgeführt.");

/* ================= MOBILITÄT ================= */
if(/mobilisiert|aufgestanden/.test(input) && /hilfe|unterstützung/.test(input))
r.push("Die Mobilisation erfolgte mit Unterstützung.");
else if(/mobilisiert|aufgestanden/.test(input))
r.push("Die Mobilisation erfolgte entsprechend vorhandener Ressourcen.");

if(/bettlägerig|liegt im bett/.test(input))
r.push("Bewohner/in war überwiegend bettlägerig.");

/* ================= AUSSCHIEDUNG ================= */
if(/eingekotet|stuhl überall/.test(input))
r.push("Es zeigte sich eine Stuhlkontamination.");

if(/eingenässt|urin überall/.test(input))
r.push("Es zeigte sich eine Harnkontamination.");

if(/verstopfung/.test(input))
r.push("Hinweis auf Obstipation.");

if(/durchfall/.test(input))
r.push("Es zeigte sich Diarrhoe.");

/* ================= ERNÄHRUNG ================= */
if(/nicht.*gegessen|essen verweigert/.test(input))
r.push("Die angebotene Nahrungsaufnahme wurde nicht angenommen.");

if(/nicht.*getrunken/.test(input))
r.push("Die angebotene Flüssigkeitsaufnahme wurde nicht angenommen.");

if(/gut.*getrunken/.test(input))
r.push("Die Trinkmenge wurde als ausreichend dokumentiert.");

if(/wenig.*getrunken/.test(input))
r.push("Die Trinkmenge zeigte sich reduziert.");

/* ================= HAUT ================= */
if(/wunde|offene stelle/.test(input))
r.push("Wundbeobachtung erfolgte.");

if(/rötung|gerötet/.test(input))
r.push("Rötungen wurden beobachtet.");

/* ================= SCHMERZ ================= */
if(/keine.*schmerzen/.test(input))
r.push("Bewohner/in gab keine Schmerzen an.");
else if(/schmerzen|schmerz/.test(input))
r.push("Schmerzangaben wurden dokumentiert.");

/* ================= ATMUNG ================= */
if(/atemnot|kurzatmig/.test(input))
r.push("Bewohner/in klagte über Atemnot.");

if(/husten/.test(input))
r.push("Husten wurde beobachtet.");

/* ================= VITAL ================= */
if(/blutdruck|rr/.test(input))
r.push("Blutdruckkontrolle erfolgte.");

if(/puls/.test(input))
r.push("Pulskontrolle erfolgte.");

if(/temperatur|fieber/.test(input))
r.push("Temperaturkontrolle erfolgte.");

/* ================= VERHALTEN ================= */
if(/schreit|brüllt/.test(input))
r.push("Wiederholte Lautäußerungen wurden beobachtet.");

if(/aggressiv|schlägt/.test(input))
r.push("Herausforderndes Verhalten wurde beobachtet.");

/* ================= SCHLAF ================= */
if(/durchgeschlafen/.test(input))
r.push("Nachtruhe ohne Unterbrechung.");

if(/mehrfach wach|oft wach/.test(input))
r.push("Bewohner/in war mehrfach wach.");

/* ================= MEDIKATION ================= */
if(/medikament|tablette|medis/.test(input))
r.push("Die Medikamentengabe erfolgte gemäß ärztlicher Verordnung.");

/* ================= ABSCHLUSS ================= */
r.push("Weitere dokumentationsrelevante Auffälligkeiten zeigten sich nicht.");

/* Duplikate entfernen */
r=[...new Set(r)];

document.getElementById("output").value=r.join("\n\n");
}

/* ================= COPY ================= */
function copyText(){
let text=document.getElementById("output").value;
navigator.clipboard.writeText(text);
alert("Bericht kopiert");
}

/* ================= RESET ================= */
function resetAll(){
document.getElementById("input").value="";
document.getElementById("output").value="";
}

/* ================= DRAG ================= */
let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});

document.addEventListener("mouseup",function(){ isDown=false; });

document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

</script>

</body>
</html>
