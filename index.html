<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JennAI</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;
}

#widget{
position:fixed;bottom:20px;right:20px;width:540px;height:640px;
background:white;border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:#0f4c81;color:white;padding:12px;font-weight:bold;
}

.content{
padding:14px;flex:1;overflow:auto;
}

textarea{
width:100%;height:140px;border-radius:8px;
border:1px solid #c9d3e0;padding:8px;margin-top:8px;
}

button{
width:100%;padding:10px;margin-top:8px;
border:none;border-radius:8px;font-weight:bold;cursor:pointer;
}

.generate{background:#0f4c81;color:white;}
.smart{background:#8e44ad;color:white;}
.learn{background:#f39c12;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}

</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header">JennAI – Pflegeassistenz</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="smart" onclick="generateSmart()">🤖 KI Modus</button>
<button class="learn" onclick="learn()">🧠 Lernen</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* UI */
function openWidget(){
widget.style.display="flex";
openBtn.style.display="none";
}

/* MEMORY */
function getMemory(){
return JSON.parse(localStorage.getItem("pflegeKI")) || [];
}
function saveMemory(m){
localStorage.setItem("pflegeKI", JSON.stringify(m));
}

/* ================= BASIS KI ================= */
function generate(){

let t = input.value.toLowerCase();
let memory = getMemory();

/* gelernt */
for(let m of memory){
if(t.includes(m.input)){
output.value = m.output + " (gelernt)";
return;
}
}

let r=[];
let risks=[];

if(t.includes("schlecht")){r.push("Allgemeinzustand deutlich reduziert");risks.push("kritisch");}
if(t.includes("verwirrt") || t.includes("komisch")) r.push("wirkte desorientiert");
if(t.includes("läuft") || t.includes("unruhig")){r.push("motorisch unruhig");risks.push("Sturzrisiko");}
if(t.includes("weglaufen")){r.push("Weglauftendenz vorhanden");risks.push("Eigengefährdung");}
if(t.includes("trinkt nicht")){r.push("Flüssigkeitsaufnahme verweigert");risks.push("Dehydratation");}
if(t.includes("stuhl") && t.includes("verschmiert")) r.push("Stuhlkontamination festgestellt");

let text="";

if(r.length){
text = r.join(", ") + ".";
}

if(risks.length){
text += " Risiken: " + [...new Set(risks)].join(", ") + ".";
}

if(!text){
text="Keine relevanten Auffälligkeiten.";
}

output.value=text;
}

/* ================= SMART KI (FAKE GPT STYLE) ================= */
function generateSmart(){

generate(); // Basis

let t = output.value;

/* Stil verbessern wie ChatGPT */
t = t.replace("wirkte desorientiert","Der Bewohner zeigte sich desorientiert");
t = t.replace("motorisch unruhig","es zeigte sich eine ausgeprägte motorische Unruhe");
t = t.replace("Flüssigkeitsaufnahme verweigert","die Flüssigkeitsaufnahme wurde nicht angenommen");

output.value = t;
}

/* ================= LERNEN ================= */
function learn(){

let m = getMemory();

m.push({
input: input.value.toLowerCase(),
output: output.value
});

saveMemory(m);

alert("Gespeichert");
}

/* TOOLS */
function copyText(){
navigator.clipboard.writeText(output.value);
}
function resetAll(){
input.value="";
output.value="";
}

</script>

</body>
</html>
