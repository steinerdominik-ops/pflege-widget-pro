<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pflegebericht Pro</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fa; }

#openBtn{
position:fixed;
bottom:20px;
right:20px;
background:#0057ff;
color:white;
padding:15px 22px;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
transition:0.2s;
}

#openBtn:hover{ transform:scale(1.05); }

#widget{
position:fixed;
bottom:0;
right:20px;
width:420px;
height:600px;
background:white;
border-radius:20px 20px 0 0;
box-shadow:0 -10px 40px rgba(0,0,0,0.25);
transform:translateY(100%);
transition:0.4s ease;
display:flex;
flex-direction:column;
}

#widget.active{ transform:translateY(0); }

.header{
background:#0057ff;
color:white;
padding:16px;
border-radius:20px 20px 0 0;
font-weight:bold;
font-size:16px;
}

.content{
padding:15px;
overflow:auto;
flex:1;
}

.option{
padding:10px;
margin:6px 0;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.option:hover{ background:#eef3ff; }

.option.selected{
background:#0057ff;
color:white;
}

textarea{
width:100%;
height:90px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
resize:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.generate{ background:#0057ff; color:white; }
.copy{ background:#2ecc71; color:white; }
.reset{ background:#e74c3c; color:white; }
</style>
</head>

<body>

<button id="openBtn" onclick="toggleWidget()">Pflegebericht</button>

<div id="widget">

<div class="header">Pflegebericht Generator PRO</div>

<div class="content">

<h4>Kategorie</h4>

<div class="option" onclick="selectCategory(this)">Allgemeiner Pflegebericht</div>
<div class="option" onclick="selectCategory(this)">Essen & Trinken</div>
<div class="option" onclick="selectCategory(this)">Medikamente</div>
<div class="option" onclick="selectCategory(this)">Sturzereignis</div>

<h4>Stichwörter (mit Komma trennen)</h4>
<textarea id="keywords" placeholder="z.B. mit Unterstützung, vital stabil, mobilisiert"></textarea>

<button class="generate" onclick="generate()">Bericht generieren</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output" placeholder="Hier erscheint der generierte Pflegebericht..."></textarea>

</div>
</div>

<script>

let selectedCategory="";

function toggleWidget(){
document.getElementById("widget").classList.toggle("active");
}

function selectCategory(el){
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
selectedCategory=el.innerText;
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

const keywords=document.getElementById("keywords").value
.split(",")
.map(k=>k.trim())
.filter(k=>k!="");

const intro=[
"Bewohner/in wurde entsprechend der pflegerischen Maßnahme betreut.",
"Versorgung erfolgte planmäßig.",
"Pflegehandlung wurde sachgerecht durchgeführt."
];

const neutralEnd=[
"Keine Auffälligkeiten dokumentiert.",
"Allgemeinzustand stabil.",
"Verlauf unauffällig."
];

let text="";

switch(selectedCategory){

case "Allgemeiner Pflegebericht":
text=random(intro)+" "+neutralEnd[0];
break;

case "Essen & Trinken":
text="Bewohner/in bei Nahrungs- und Flüssigkeitsaufnahme begleitet. "+random(neutralEnd);
break;

case "Medikamente":
text="Medikamentengabe gemäß Verordnung durchgeführt. Einnahme beobachtet. "+random(neutralEnd);
break;

case "Sturzereignis":
text="Sturzereignis dokumentiert. Bewohner/in versorgt. Weitere Beobachtung eingeleitet.";
break;

default:
text="Bitte Kategorie auswählen.";
}

if(keywords.length>0){
text+=" Beobachtet: "+keywords.join(", ")+".";
}

document.getElementById("output").value=text;
}

function copyText(){
const out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

function resetAll(){
document.getElementById("keywords").value="";
document.getElementById("output").value="";
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
selectedCategory="";
}

</script>

</body>
</html>
