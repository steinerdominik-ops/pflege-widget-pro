<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CareDoc AI</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;width:80px;height:80px;
border-radius:50%;overflow:hidden;cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
#openBtn img{width:100%;height:100%;object-fit:cover;}

#widget{
position:fixed;bottom:20px;right:20px;width:420px;height:680px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{flex:1;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px;}

.msg{padding:10px 14px;border-radius:16px;max-width:85%;}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

.riskBox{
background:#fff3cd;
border-left:5px solid #ff9800;
padding:10px;
font-size:13px;
margin:8px;
border-radius:10px;
white-space:pre-line;
}

.inputArea{padding:10px;border-top:1px solid #eee;}
textarea{width:100%;height:60px;border-radius:12px;padding:10px;}

.btnRow{display:flex;gap:6px;margin-top:6px;}
button{flex:1;border:none;border-radius:12px;padding:8px;font-weight:bold;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">
<img src="https://i.postimg.cc/hjzSWJd0/jennai.png">
</div>

<div id="widget">
<div class="header">
<span>CareDoc AI</span>
<span onclick="closeWidget()">✖</span>
</div>

<div id="riskPanel"></div>
<div class="chat" id="chat"></div>

<div class="inputArea">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>
</div>
</div>

<script>

/* ===== BASIS ===== */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");
const riskPanel=document.getElementById("riskPanel");

let lastOutput="";

/* UI */
function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ===== RISIKO ENGINE ===== */
function detectRisks(t){

t=t.toLowerCase();
let risks=[];

if(/unruhig|weglaufen|irrt|wandert/.test(t)) risks.push("Sturzrisiko / Eigengefährdung");
if(/trinkt.*nicht|trinkt kaum/.test(t)) risks.push("Dehydratationsrisiko");
if(/isst.*nicht|verweigert essen/.test(t)) risks.push("Mangelernährung");
if(/schmerz|aua/.test(t)) risks.push("Schmerzbelastung");
if(/inkontinenz|stuhl|urin/.test(t)) risks.push("Hautschädigungsrisiko");
if(/atemnot|luft|kurzatmig/.test(t)) risks.push("akute Atemproblematik");

return [...new Set(risks)];
}

/* ===== OPTIMIERTE KI MIT FALLBACK ===== */
async function realAI(text){

const models=[
"openchat/openchat-3.5",
"mistralai/mistral-7b-instruct"
];

for(let model of models){

try{
let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
messages:[
{
role:"system",
content:`Du bist eine erfahrene diplomierte Pflegefachkraft.

AUFGABE:
Erstelle einen vollständigen, professionellen Pflegebericht.

WICHTIG:
- Verarbeite ALLE Inhalte der Eingabe vollständig
- Verstehe Dialekt, Umgangssprache und unstrukturierte Texte
- KEINE Risiken im Text erwähnen
- KEINE Stichpunkte

SPRACHE:
- medizinisch korrekt
- sachlich
- vollständige Sätze

STRUKTUR:
1. Allgemeinzustand
2. Orientierung
3. Verhalten
4. Körperliche Beobachtungen
5. Maßnahmen
`
},
{
role:"user",
content:text
}
]
})
});

let data=await res.json();

if(data?.choices?.[0]?.message?.content){
return data.choices[0].message.content;
}

}catch(e){}

}

return "KI aktuell nicht verfügbar";
}

/* ===== GENERATE ===== */
async function generate(){

let raw=input.value;
if(!raw) return;

addMessage(raw,"user");

/* RISIKEN */
let risks=detectRisks(raw);
riskPanel.innerHTML="";

if(risks.length){
let box=document.createElement("div");
box.className="riskBox";
box.innerText="⚠ Risiken:\n"+risks.join("\n");
riskPanel.appendChild(box);
}

/* KI */
let ai=await realAI(raw);

addMessage(ai,"ai");
lastOutput=ai;

input.value="";
}

/* COPY */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
}

/* RESET */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
riskPanel.innerHTML="";
}

</script>

</body>
</html>
