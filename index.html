<script>

/* ================= INPUT ================= */
function generate(){

let t = input.value.toLowerCase();

/* ================= LEVEL 1–2: SYNONYME ================= */
function has(...arr){
return arr.some(a=>t.includes(a));
}

/* ================= LEVEL 3: KONTEXT ================= */
let findings = [];
let risks = new Set();

/* ===== ZUSTAND ===== */
if(has("az schlecht","kritisch","mies","sehr schlecht","extrem schwach")){
findings.push({text:"Allgemeinzustand deutlich reduziert",prio:1});
risks.add("hoch");
}
else if(has("reduziert","schwach")){
findings.push({text:"Allgemeinzustand reduziert",prio:2});
}
else if(has("stabil","gut")){
findings.push({text:"Allgemeinzustand stabil",prio:3});
}

/* ===== TRINKEN ===== */
if(has("trinkt nicht","verweigert trinken","nimmt nichts an","kaum getrunken","nichts getrunken")){
findings.push({text:"Flüssigkeitsaufnahme verweigert",prio:1});
risks.add("dehydratation");
}
else if(has("wenig getrunken")){
findings.push({text:"Trinkmenge reduziert",prio:2});
risks.add("dehydratation");
}

/* ===== ESSEN ===== */
if(has("isst nicht","nicht gegessen","verweigert essen","nimmt nichts an")){
findings.push({text:"Nahrungsaufnahme nicht erfolgt",prio:1});
risks.add("mangelernährung");
}

/* ===== STUHL ===== */
if(has("stuhl verschmiert","eingekotet","stuhl überall","stuhl im bett","stuhl in kleidung")){
findings.push({text:"Stuhlkontamination festgestellt",prio:1});
risks.add("haut");
}

/* ===== HARN ===== */
if(has("eingenässt","alles nass","urin überall","hose nass","bett nass")){
findings.push({text:"Harnkontamination festgestellt",prio:1});
risks.add("haut");
}

/* ===== MOBILITÄT ===== */
if(has("unsicher","wackelig","fast gestürzt")){
findings.push({text:"erhöhtes Sturzrisiko",prio:2});
risks.add("sturz");
}
if(has("bettlägerig","kommt nicht hoch")){
findings.push({text:"überwiegend bettlägerig",prio:2});
risks.add("dekubitus");
}

/* ===== VERHALTEN ===== */
if(has("verwirrt","komisch drauf","anders als sonst","durcheinander")){
findings.push({text:"wirkte desorientiert",prio:2});
risks.add("sturz");
}
if(has("unruhig","läuft herum","zappelig")){
findings.push({text:"motorisch unruhig",prio:2});
}

/* ===== ATMUNG ===== */
if(has("atemnot","bekommt schlecht luft","luftnot")){
findings.push({text:"Atemnot",prio:1});
risks.add("akut");
}
if(has("husten")){
findings.push({text:"Husten",prio:3});
}

/* ===== HAUT ===== */
if(has("wunde","offene stelle")){
findings.push({text:"Wunde vorhanden",prio:1});
risks.add("infektion");
}
if(has("rötung","rot")){
findings.push({text:"Rötung beobachtet",prio:2});
risks.add("dekubitus");
}

/* ===== SCHMERZ ===== */
if(has("schmerzen","aua","tut weh","jammert")){
findings.push({text:"Schmerzen angegeben",prio:2});
}

/* ===== SCHLAF ===== */
if(has("schlecht geschlafen","oft wach")){
findings.push({text:"Nachtruhe gestört",prio:3});
}

/* ===== MEDIKATION ===== */
if(has("medikamente","tabletten","medis")){
findings.push({text:"Medikation verabreicht",prio:3});
}

/* ================= LEVEL 4: PRIORISIERUNG ================= */
findings.sort((a,b)=>a.prio-b.prio);

/* ================= TEXT ================= */
let parts=[...new Set(findings.map(f=>f.text))];

let text="";

if(parts.length){
text=parts[0];
for(let i=1;i<parts.length;i++){
text+=(i===parts.length-1?" und ":", ")+parts[i];
}
text+=".";
}else{
text="Keine relevanten Auffälligkeiten.";
}

/* ================= LEVEL 5: RISIKEN ================= */
if(risks.size){
text+=" Risiken: "+[...risks].join(", ")+".";
}

/* ================= LEVEL 6: FEINSINN ================= */
if(has("komisch drauf","nicht wie sonst")){
text+=" Verhalten im Vergleich zu sonst verändert.";
}

/* OUTPUT */
output.value = text.charAt(0).toUpperCase()+text.slice(1);
}

</script>
