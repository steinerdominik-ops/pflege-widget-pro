<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jenn AI</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;width:80px;height:80px;
border-radius:50%;overflow:hidden;cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
#openBtn img{width:100%;height:100%;object-fit:cover;}

#widget{
position:fixed;bottom:20px;right:20px;width:420px;height:680px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{flex:1;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px;}

.msg{padding:10px 14px;border-radius:16px;max-width:85%;white-space:pre-line;}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

.riskBox{
background:#fff3cd;
border-left:5px solid #ff9800;
padding:10px;font-size:13px;
margin:8px;border-radius:10px;
white-space:pre-line;
}

.inputArea{padding:10px;border-top:1px solid #eee;}
textarea{width:100%;height:60px;border-radius:12px;padding:10px;}

.btnRow{display:flex;gap:6px;margin-top:6px;}
button{flex:1;border:none;border-radius:12px;padding:8px;font-weight:bold;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">
<img src="https://i.postimg.cc/hjzSWJd0/jennai.png">
</div>

<div id="widget">
<div class="header">
<span>Jenn AI</span>
<span onclick="closeWidget()">✖</span>
</div>

<div id="riskPanel"></div>
<div class="chat" id="chat"></div>

<div class="inputArea">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>
</div>
</div>

<script>

/* CONFIG */
const HF_API_KEY = "DEIN_HF_KEY";
const MODEL_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";

/* UI */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");

let lastOutput="";

function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ENTER */
input.addEventListener("keydown", function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
generate();
}
});

/* KI CALL */
async function callAI(text){

const prompt = `
Du bist eine diplomierte Pflegefachkraft.

Erstelle:
- Pflegedokumentation
- Risiken
- Maßnahmen

Kurz, sachlich, korrekt.
`;

try{
const response = await fetch(MODEL_URL,{
method:"POST",
headers:{
"Authorization":"Bearer "+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,
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs: prompt + "\n\n" + text,
parameters:{max_new_tokens:250,temperature:0.4}
})
});

const data = await response.json();

/* WICHTIG: Fehler abfangen */
if(data.error){
return "⚠ Modell lädt gerade... bitte nochmal klicken.";
}

/* Standard Output */
if(Array.isArray(data) && data[0].generated_text){
return data[0].generated_text.replace(prompt,"").trim();
}

return "⚠ Keine Antwort von KI.";

}catch(e){
return "⚠ Verbindungsfehler.";
}

}

/* GENERATE */
async function generate(){

let raw=input.value.trim();
if(!raw) return;

addMessage(raw,"user");

/* Lade Nachricht */
let loadingMsg=document.createElement("div");
loadingMsg.className="msg ai";
loadingMsg.innerText="KI analysiert...";
chat.appendChild(loadingMsg);

/* KI */
let result=await callAI(raw);

/* Ersetzen statt hängen bleiben */
loadingMsg.innerText=result;

lastOutput=result;
input.value="";
}

/* COPY */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
alert("Text kopiert");
}

/* RESET */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
}

</script>

</body>
</html>
