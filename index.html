<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jenn AI</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;width:80px;height:80px;
border-radius:50%;overflow:hidden;cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
#openBtn img{width:100%;height:100%;object-fit:cover;}

#widget{
position:fixed;bottom:20px;right:20px;width:420px;height:680px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{
flex:1;padding:12px;overflow:auto;
display:flex;flex-direction:column;gap:10px;
}

.msg{
padding:10px 14px;border-radius:16px;max-width:85%;
white-space:pre-line;
}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

.riskBox{
background:#fff3cd;
border-left:5px solid #ff9800;
padding:10px;
font-size:13px;
margin:8px;
border-radius:10px;
white-space:pre-line;
}

.inputArea{padding:10px;border-top:1px solid #eee;}

textarea{
width:100%;height:60px;border-radius:12px;
padding:10px;resize:none;
}

.btnRow{display:flex;gap:6px;margin-top:6px;}

button{
flex:1;border:none;border-radius:12px;
padding:8px;font-weight:bold;cursor:pointer;
}

.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">
<img src="https://i.postimg.cc/hjzSWJd0/jennai.png">
</div>

<div id="widget">
<div class="header">
<span>Jenn AI</span>
<span onclick="closeWidget()">✖</span>
</div>

<div id="riskPanel"></div>
<div class="chat" id="chat"></div>

<div class="inputArea">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>
</div>
</div>

<script>

/* ===== UI ===== */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");
const riskPanel=document.getElementById("riskPanel");

let lastOutput="";

function openWidget(){
widget.style.display="flex";
openBtn.style.display="none";
}

function closeWidget(){
widget.style.display="none";
openBtn.style.display="block";
}

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ENTER SENDEN */
input.addEventListener("keydown", function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
generate();
}
});

/* ===== RISIKEN ===== */
function detectRisks(t){
t=t.toLowerCase();
let r=[];

if(/unruhig|irrt|weglaufen|läuft/.test(t)) r.push("Sturzrisiko");
if(/trink/.test(t) && /(nicht|wenig)/.test(t)) r.push("Dehydratation");
if(/ess|verweig/.test(t)) r.push("Mangelernährung");
if(/schmerz/.test(t)) r.push("Schmerzbelastung");
if(/stuhl|urin|inkontinenz/.test(t)) r.push("Hautschädigung");
if(/rötung|wunde|dekubitus/.test(t)) r.push("Dekubitusrisiko");

return [...new Set(r)];
}

/* ===== KI ===== */
function smartAI(text){

text=text.toLowerCase();
let s=[];

/* Zustand */
if(/schlecht|müde|schwach/.test(text))
s.push("Der Allgemeinzustand wirkte reduziert.");

/* Orientierung */
if(/verwirrt|desorientiert/.test(text))
s.push("Der Bewohner war zeitlich und/oder örtlich desorientiert.");

/* Verhalten */
if(/unruhig|irrt|läuft/.test(text))
s.push("Es zeigte sich eine ausgeprägte motorische Unruhe mit Umhergehen.");

if(/schreit|laut/.test(text))
s.push("Es kam wiederholt zu lautem Rufen.");

if(/weint/.test(text))
s.push("Der Bewohner wirkte emotional belastet.");

/* Schmerz */
if(/bein/.test(text)&&/schmerz/.test(text))
s.push("Der Bewohner klagte über Schmerzen im rechten Bein.");

if(/rücken/.test(text)&&/schmerz/.test(text))
s.push("Der Bewohner äußerte Rückenschmerzen.");

/* Ernährung */
if(/verweig|isst.*nicht/.test(text))
s.push("Die Nahrungsaufnahme wurde verweigert.");

if(/trink/.test(text) && /(nicht|wenig)/.test(text))
s.push("Die Trinkmenge war deutlich reduziert.");

/* Haut */
if(/rot|rötung/.test(text)&&/po|gesäß/.test(text))
s.push("Im Gesäßbereich zeigte sich eine Hautrötung.");

/* Ausscheidung */
if(/stuhl/.test(text))
s.push("Es lag eine Stuhlinkontinenz vor.");

if(/urin/.test(text))
s.push("Es bestand Harninkontinenz.");

/* Bewegung */
if(/zimmer|läuft/.test(text))
s.push("Der Bewohner bewegte sich selbstständig innerhalb der Einrichtung.");

/* FALLBACK */
if(!s.length){
return "Es zeigten sich keine pflegerisch relevanten Auffälligkeiten.";
}

return s.join(" ");
}

/* ===== GENERATE ===== */
function generate(){

let raw=input.value.trim();
if(!raw) return;

addMessage(raw,"user");

/* RISIKEN */
let risks=detectRisks(raw);
riskPanel.innerHTML="";

if(risks.length){
let box=document.createElement("div");
box.className="riskBox";
box.innerText="⚠ Risiken:\n"+risks.join("\n");
riskPanel.appendChild(box);
}

/* KI TEXT + MASSNAHMEN */
let result=smartAI(raw);

let full = result + "\n\nMaßnahmen: Beobachtung, Flüssigkeitsangebot, Sturzprophylaxe.";

/* OUTPUT */
addMessage(full,"ai");
lastOutput=full;

input.value="";
}

/* COPY */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
alert("Text kopiert");
}

/* RESET */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
riskPanel.innerHTML="";
}

</script>

</body>
</html>
