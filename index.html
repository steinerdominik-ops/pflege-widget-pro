<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Pflege KI PRO</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
#openBtn{position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;}
#widget{
position:fixed;bottom:20px;right:20px;width:580px;height:720px;
background:white;border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,0.3);
display:none;flex-direction:column;
}
.header{background:#0f4c81;color:white;padding:12px;display:flex;justify-content:space-between;}
.content{padding:12px;flex:1;overflow:auto;}

textarea{width:100%;height:120px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;}

button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.generate{background:#0f4c81;color:white;}
.ki{background:#8e44ad;color:white;}
.learn{background:#f39c12;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}

.section{margin-top:10px;font-size:13px;color:#555;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header">
<span>JennAI – Pflege KI PRO</span>
<span onclick="closeWidget()">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="ki" onclick="generateKI()">🤖 KI (ChatGPT)</button>
<button class="learn" onclick="learn()">🧠 Lernen</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>

<textarea id="output"></textarea>

<div class="section">System lernt neue Wörter automatisch lokal im Browser.</div>

</div>
</div>

<script>

/* UI */
function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

/* ================= LERN-SYSTEM ================= */

function getMemory(){
return JSON.parse(localStorage.getItem("pflegeKI")) || [];
}

function saveMemory(data){
localStorage.setItem("pflegeKI", JSON.stringify(data));
}

/* Benutzer bringt System neue Wörter bei */
function learn(){

let inputText = input.value.toLowerCase();
let outputText = output.value;

if(!inputText || !outputText){
alert("Bitte erst Text + Ergebnis erzeugen");
return;
}

let memory = getMemory();

memory.push({
input: inputText,
output: outputText
});

saveMemory(memory);

alert("Gespeichert – KI hat gelernt");
}

/* ================= PSEUDO KI ================= */

function generate(){

let t = input.value.toLowerCase();

let s1=[], s2=[], risks=new Set();

function has(...w){return w.some(x=>t.includes(x));}

/* ===== GELERNTES ZUERST ===== */
let memory = getMemory();

for(let m of memory){
if(t.includes(m.input)){
output.value = m.output + " (gelernt)";
return;
}
}

/* ===== STANDARD LOGIK ===== */

/* Zustand */
if(has("schlecht","kritisch","sehr schwach","mies")){
s1.push("Der Allgemeinzustand zeigte sich deutlich reduziert");
risks.add("Allgemeinzustand kritisch");
}

/* Orientierung */
if(has("komisch","verwirrt","anders")){
s1.push("wirkte desorientiert");
}

/* Verhalten */
if(has("läuft herum","unruhig","wandert")){
s1.push("motorisch unruhig");
risks.add("Sturzrisiko");
}

if(has("weglaufen","weglauftendenz")){
s1.push("Weglauftendenz vorhanden");
risks.add("Eigengefährdung");
}

/* Essen + Trinken */
if(has("nimmt nichts an")){
s2.push("Nahrungs- und Flüssigkeitsaufnahme verweigert");
risks.add("Dehydratation");
}
else{
if(has("isst nicht")){
s2.push("Nahrungsaufnahme nicht erfolgt");
}
if(has("trinkt nicht","kaum getrunken")){
s2.push("Flüssigkeitsaufnahme reduziert");
risks.add("Dehydratation");
}
}

/* Ausscheidung */
if(has("stuhl","verschmiert","eingekotet")){
s2.push("Stuhlkontamination festgestellt");
}

if(has("nass","urin")){
s2.push("Harninkontinenz festgestellt");
}

/* Haut */
if(has("wunde")){
s2.push("Wunde vorhanden");
}

/* TEXT BAUEN */
let text="";

if(s1.length){
text += s1.join(", ") + ". ";
}

if(s2.length){
text += s2.join(", ") + ". ";
}

if(risks.size){
text += "Risiken: " + [...risks].join(", ") + ".";
}

if(!text){
text="Keine relevanten Auffälligkeiten.";
}

output.value = text.charAt(0).toUpperCase()+text.slice(1);
}

/* ================= CHATGPT ================= */

function generateKI(){

let text = input.value;

let prompt = `
Du bist Pflegefachkraft.

Schreibe einen professionellen Pflegebericht:
- sachlich
- Fachsprache
- mehrere Sätze
- Risiken benennen

Text:
${text}
`;

navigator.clipboard.writeText(prompt);
window.open("https://chat.openai.com");
}

/* TOOLS */
function copyText(){navigator.clipboard.writeText(output.value);}
function resetAll(){input.value="";output.value="";}

</script>

</body>
</html>
