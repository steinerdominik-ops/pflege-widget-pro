<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Digitale Pflegeassistenz</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;
}

#widget{
position:fixed;bottom:20px;right:20px;width:560px;height:700px;
background:white;border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;flex-direction:column;
}

.header{
background:#0f4c81;color:white;padding:12px;
display:flex;justify-content:space-between;cursor:move;
}

.content{
padding:12px;flex:1;overflow:auto;
}

textarea{
width:100%;height:140px;margin-top:8px;
padding:8px;border-radius:6px;border:1px solid #ccc;
}

button{
width:100%;padding:10px;margin-top:8px;
border:none;border-radius:6px;font-weight:bold;cursor:pointer;
}

.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}

</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header" id="dragHeader">
<span>JennAI – Pflegebericht PRO</span>
<span onclick="closeWidget()" style="cursor:pointer;">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* DOM FIX */
const widget = document.getElementById("widget");
const openBtn = document.getElementById("openBtn");
const input = document.getElementById("input");
const output = document.getElementById("output");
const dragHeader = document.getElementById("dragHeader");

/* UI */
function openWidget(){
widget.style.display="flex";
openBtn.style.display="none";
}

function closeWidget(){
widget.style.display="none";
openBtn.style.display="block";
}

/* ================= GENERATE ================= */
async function generate(){

let raw = input.value.toLowerCase();

/* ===== PSEUDO KI ===== */
let text = "";

if(raw.includes("schlecht")){
text += "Der Allgemeinzustand zeigte sich deutlich reduziert. ";
}
if(raw.includes("verwirrt") || raw.includes("komisch")){
text += "Bewohner wirkte desorientiert. ";
}
if(raw.includes("läuft") || raw.includes("unruhig")){
text += "Es zeigte sich motorische Unruhe. ";
}
if(raw.includes("weglaufen")){
text += "Weglauftendenz vorhanden. ";
}
if(raw.includes("trinkt nicht")){
text += "Flüssigkeitsaufnahme verweigert. ";
}
if(raw.includes("stuhl") && raw.includes("verschmiert")){
text += "Stuhlkontamination festgestellt. ";
}

if(!text){
text = "Keine relevanten Auffälligkeiten.";
}

/* sofort anzeigen */
output.value = text;

/* ===== KI IM HINTERGRUND ===== */
let ai = await hfAI(raw);

if(ai && ai.length > text.length){
output.value = ai;
}

}

/* ================= KI ================= */
async function hfAI(text){

try{
let res = await fetch(
"https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct",
{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs: `
Schreibe einen professionellen Pflegebericht:
- sachlich
- Fachsprache
- mehrere Sätze
- Risiken benennen

Text:
${text}
`
})
});

let data = await res.json();

if(Array.isArray(data)){
return data[0]?.generated_text;
}

}catch(e){
return null;
}

}

/* COPY */
function copyText(){
navigator.clipboard.writeText(output.value);
alert("Bericht kopiert");
}

/* RESET */
function resetAll(){
input.value="";
output.value="";
}

/* DRAG */
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=widget.offsetLeft - e.clientX;
offsetY=widget.offsetTop - e.clientY;
});

document.addEventListener("mouseup",()=>isDown=false);

document.addEventListener("mousemove",function(e){
if(!isDown) return;
widget.style.left=(e.clientX + offsetX)+"px";
widget.style.top=(e.clientY + offsetY)+"px";
widget.style.bottom="auto";
widget.style.right="auto";
});

</script>

</body>
</html>
