<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Digitale Pflegeassistenz</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
#openBtn{position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;}
#widget{
position:fixed;bottom:20px;right:20px;width:520px;height:640px;
background:white;border-radius:12px;box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;flex-direction:column;overflow:hidden;
}
.header{background:#0f4c81;color:white;padding:12px;display:flex;justify-content:space-between;cursor:move;}
.content{padding:12px;flex:1;overflow:auto;}
textarea{width:100%;height:140px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
.debug{font-size:12px;color:#555;margin-top:6px;white-space:pre-wrap;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header" id="dragHeader">
<span>JennAI – Digitale Pflegeassistenz</span>
<span onclick="closeWidget()" style="cursor:pointer;">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben... z.B. 'az schlecht, kaum getrunken, verwirrt'"></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>
<div id="debug" class="debug"></div>

</div>
</div>

<script>

/* ================= OPEN ================= */
function openWidget(){
document.getElementById("widget").style.display="flex";
document.getElementById("openBtn").style.display="none";
}
function closeWidget(){
document.getElementById("widget").style.display="none";
document.getElementById("openBtn").style.display="block";
}

/* ================= SYNONYM SYSTEM ================= */
const patterns = {

zustand_stark: /\b(az|allgemeinzustand).*(schlecht|sehr schlecht|kritisch|mies)|stark reduziert/,
zustand_mittel: /\b(az|allgemeinzustand).*(reduziert|eingeschränkt)|\breduziert\b/,
zustand_gut: /\b(az|allgemeinzustand).*(gut|stabil)|\bstabil\b/,

orientierung: /\b(verwirrt|desorientiert|orientierungslos)\b/,
orientiert: /\borientiert\b/,

mobil_hilfe: /\b(aufgestanden|mobilisiert).*(hilfe|unterstützung)\b/,
mobil: /\b(aufgestanden|mobilisiert)\b/,
bett: /\b(bettlägerig|liegt im bett)\b/,

essen_nicht: /\b(nicht gegessen|essen verweigert|kaum gegessen)\b/,
trinken_nicht: /\b(nicht getrunken|kaum getrunken)\b/,
trinken_wenig: /\b(wenig getrunken)\b/,
trinken_gut: /\b(gut getrunken|ausreichend getrunken)\b/,

stuhl: /\b(eingekotet|stuhl überall)\b/,
harn: /\b(eingenässt|urin überall)\b/,

schmerzfrei: /\b(keine schmerzen)\b/,
schmerz: /\b(schmerzen|schmerz)\b/,

unruhe: /\b(unruhig)\b/,
aggressiv: /\b(aggressiv|schlägt|tritt)\b/,

husten: /\b(husten|hustet)\b/,
atemnot: /\b(atemnot|kurzatmig)\b/
};

/* ================= GENERATOR ================= */
function generate(){

let input=document.getElementById("input").value.toLowerCase();
let r=[];
let debug=[];

r.push("Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen betreut.");

/* Zustand */
if(patterns.zustand_stark.test(input)){
r.push("Der Allgemeinzustand zeigte sich stark reduziert.");
debug.push("zustand: stark");
}
else if(patterns.zustand_mittel.test(input)){
r.push("Der Allgemeinzustand zeigte sich reduziert.");
debug.push("zustand: reduziert");
}
else if(patterns.zustand_gut.test(input)){
r.push("Der Allgemeinzustand zeigte sich stabil.");
debug.push("zustand: stabil");
}

/* Orientierung */
if(patterns.orientierung.test(input)){
r.push("Bewohner/in zeigte sich desorientiert.");
debug.push("orientierung: desorientiert");
}
else if(patterns.orientiert.test(input)){
r.push("Bewohner/in war orientiert.");
}

/* Mobilität */
if(patterns.mobil_hilfe.test(input)){
r.push("Die Mobilisation erfolgte mit Unterstützung.");
}
else if(patterns.mobil.test(input)){
r.push("Die Mobilisation erfolgte entsprechend vorhandener Ressourcen.");
}
if(patterns.bett.test(input)){
r.push("Bewohner/in war überwiegend bettlägerig.");
}

/* Ernährung */
if(patterns.essen_nicht.test(input)){
r.push("Die angebotene Nahrungsaufnahme wurde nicht angenommen.");
}
if(patterns.trinken_nicht.test(input)){
r.push("Die angebotene Flüssigkeitsaufnahme wurde nicht angenommen.");
}
else if(patterns.trinken_wenig.test(input)){
r.push("Die Trinkmenge zeigte sich reduziert.");
}
else if(patterns.trinken_gut.test(input)){
r.push("Die Trinkmenge wurde als ausreichend dokumentiert.");
}

/* Ausscheidung */
if(patterns.stuhl.test(input)){
r.push("Es zeigte sich eine Stuhlkontamination.");
}
if(patterns.harn.test(input)){
r.push("Es zeigte sich eine Harnkontamination.");
}

/* Schmerz */
if(patterns.schmerzfrei.test(input)){
r.push("Bewohner/in gab keine Schmerzen an.");
}
else if(patterns.schmerz.test(input)){
r.push("Schmerzangaben wurden dokumentiert.");
}

/* Verhalten */
if(patterns.unruhe.test(input)){
r.push("Motorische Unruhe wurde beobachtet.");
}
if(patterns.aggressiv.test(input)){
r.push("Herausforderndes Verhalten wurde beobachtet.");
}

/* Atmung */
if(patterns.atemnot.test(input)){
r.push("Bewohner/in klagte über Atemnot.");
}
if(patterns.husten.test(input)){
r.push("Husten wurde beobachtet.");
}

/* Abschluss */
r.push("Weitere dokumentationsrelevante Auffälligkeiten zeigten sich nicht.");

r=[...new Set(r)];

document.getElementById("output").value=r.join("\n\n");

/* Debug anzeigen */
document.getElementById("debug").innerText="DEBUG:\n"+debug.join("\n");
}

/* ================= COPY ================= */
function copyText(){
navigator.clipboard.writeText(document.getElementById("output").value);
alert("Bericht kopiert");
}

/* ================= RESET ================= */
function resetAll(){
input.value="";
output.value="";
debug.innerText="";
}

/* ================= DRAG ================= */
let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});
document.addEventListener("mouseup",()=>isDown=false);
document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

</script>
</body>
</html>
