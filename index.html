<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jenn AI</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fa; }

#openBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
background:#001a80;
color:white;
border:none;
border-radius:50%;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
z-index:1000;
}

#widget{
position:fixed;
bottom:20px;
right:20px;
width:520px;
height:620px;
min-width:420px;
min-height:500px;
background:white;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
z-index:1001;
}

.header{
background:#001a80;
color:white;
padding:14px;
cursor:move;
font-weight:bold;
border-radius:18px 18px 0 0;
}

.content{
padding:14px;
overflow:auto;
flex:1;
}

textarea{
width:100%;
height:150px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
margin-top:8px;
resize:none;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.generate{ background:#001a80; color:white; }
.copy{ background:#2ecc71; color:white; }
.reset{ background:#e74c3c; color:white; }

</style>
</head>

<body>

<button id="openBtn">PB</button>

<div id="widget">
<div class="header" id="dragHeader">Pflegebericht Generator – MASTER PRO</div>
<div class="content">

<textarea id="input" placeholder="Freitext eingeben..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

let widget=document.getElementById("widget");
let openBtn=document.getElementById("openBtn");

openBtn.onclick=function(){
widget.style.display="flex";
openBtn.style.display="none";
};

function normalize(input){

const replacements = {

/* Allgemeinzustand */
"scheisse":"stark reduziert",
"mies":"reduziert",
"katastrophe":"stark reduziert",
"extrem schlecht":"stark reduziert",
"am ende":"erschöpft",
"total fertig":"erschöpft",
"fix und fertig":"erschöpft",

/* Essen */
"frisst nix":"nahrungsaufnahme nicht angenommen",
"isst nix":"nahrungsaufnahme nicht angenommen",
"will nicht essen":"nahrungsaufnahme nicht angenommen",

/* Trinken */
"trinkt nix":"flüssigkeitsaufnahme nicht angenommen",

/* Verhalten */
"schreit rum":"lautäußerungen",
"rastet aus":"herausforderndes verhalten",
"aggressiv":"herausforderndes verhalten",

/* Ausscheidung */
"stuhl überall":"stuhl kontaminiert",
"urin überall":"harn kontaminiert",

};

for (let key in replacements) {
let regex = new RegExp(key,"g");
input = input.replace(regex,replacements[key]);
}

return input;
}

function generate(){

let input=document.getElementById("input").value.toLowerCase();
input=normalize(input);

let r=[];
r.push("Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen betreut.");

/* AZ */
if(input.includes("stark reduziert"))
r.push("Der Allgemeinzustand zeigte sich stark reduziert.");
else if(input.includes("reduziert"))
r.push("Der Allgemeinzustand zeigte sich reduziert.");

if(input.includes("erschöpft"))
r.push("Bewohner/in wirkte deutlich erschöpft.");

/* Ernährung */
if(input.includes("nahrungsaufnahme nicht angenommen"))
r.push("Die angebotene Nahrungsaufnahme wurde nicht angenommen.");

if(input.includes("flüssigkeitsaufnahme nicht angenommen"))
r.push("Die angebotene Flüssigkeitsaufnahme wurde nicht angenommen.");

/* Verhalten */
if(input.includes("lautäußerungen"))
r.push("Wiederholte Lautäußerungen wurden beobachtet.");

if(input.includes("herausforderndes verhalten"))
r.push("Herausforderndes Verhalten wurde beobachtet.");

/* Ausscheidung */
if(input.includes("stuhl kontaminiert"))
r.push("Es zeigte sich eine Stuhlkontamination.");

if(input.includes("harn kontaminiert"))
r.push("Es zeigte sich eine Harnkontamination.");

/* Abschluss */
r.push("Weitere dokumentationsrelevante Auffälligkeiten zeigten sich nicht.");

document.getElementById("output").value=r.join("\n\n");
}

function copyText(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

function resetAll(){
document.getElementById("input").value="";
document.getElementById("output").value="";
}

/* Drag */
let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});

document.addEventListener("mouseup",function(){ isDown=false; });

document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

</script>

</body>
</html>
