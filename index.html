<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pflegebericht PRO V4</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fa; }

#openBtn{
position:fixed;
bottom:20px;
right:20px;
background:#0047ff;
color:white;
padding:15px 22px;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

#widget{
position:fixed;
bottom:0;
right:20px;
width:430px;
height:620px;
background:white;
border-radius:20px 20px 0 0;
box-shadow:0 -10px 40px rgba(0,0,0,0.25);
transform:translateY(100%);
transition:0.4s ease;
display:flex;
flex-direction:column;
}

#widget.active{ transform:translateY(0); }

.header{
background:#0047ff;
color:white;
padding:16px;
border-radius:20px 20px 0 0;
font-weight:bold;
}

.content{
padding:15px;
overflow:auto;
flex:1;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
resize:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.generate{ background:#0047ff; color:white; }
.copy{ background:#2ecc71; color:white; }
.reset{ background:#e74c3c; color:white; }
.mode{ background:#555; color:white; }

</style>
</head>

<body>

<button id="openBtn" onclick="toggleWidget()">Pflegebericht</button>

<div id="widget">

<div class="header">Pflegebericht Generator PRO V4</div>

<div class="content">

<button class="mode" onclick="toggleMode()">Modus wechseln (Standard / Schnell)</button>

<h4>Stichwörter (beliebige Sprache möglich)</h4>
<textarea id="keywords" placeholder="z.B. assisted, stable, mobilized oder mit Unterstützung, vital stabil"></textarea>

<button class="generate" onclick="generate()">Bericht generieren</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output" placeholder="Hier erscheint der generierte Pflegebericht..."></textarea>

</div>
</div>

<script>

let mode="standard";

function toggleWidget(){
document.getElementById("widget").classList.toggle("active");
}

function toggleMode(){
mode = mode==="standard" ? "schnell" : "standard";
alert("Aktueller Modus: "+mode);
}

function translate(word){

const dict={
"assisted":"mit Unterstützung",
"stable":"vital stabil",
"mobilized":"mobilisiert",
"ate well":"appetitgerecht gegessen",
"drank":"Trinkmenge ausreichend",
"fall":"Sturzereignis",
"medication":"Medikamentengabe",
"pain":"Schmerzangabe",
"unrest":"unruhig",
"oriented":"wach und orientiert"
};

return dict[word.toLowerCase()] || word;
}

function generate(){

let words=document.getElementById("keywords").value
.split(",")
.map(w=>w.trim())
.filter(w=>w!="")
.map(w=>translate(w));

let intro=[
"Bewohner/in wurde pflegerisch versorgt.",
"Versorgung erfolgte planmäßig.",
"Pflegehandlung sachgerecht durchgeführt."
];

let end=[
"Allgemeinzustand stabil.",
"Keine Auffälligkeiten dokumentiert.",
"Verlauf unauffällig."
];

let text="";

if(mode==="schnell"){

text="Bewohner/in: "+words.join(", ")+". "+end[Math.floor(Math.random()*end.length)];

}else{

text=intro[Math.floor(Math.random()*intro.length)]+" Beobachtet: "+words.join(", ")+". "+end[Math.floor(Math.random()*end.length)];

}

document.getElementById("output").value=text;

}

function copyText(){
const out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

function resetAll(){
document.getElementById("keywords").value="";
document.getElementById("output").value="";
}

</script>

</body>
</html>
