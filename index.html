<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI ULTIMATE MAX</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;width:80px;height:80px;
border-radius:50%;overflow:hidden;cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
#openBtn img{width:100%;height:100%;object-fit:cover;}

#widget{
position:fixed;bottom:20px;right:20px;width:380px;height:600px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{flex:1;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px;}

.msg{padding:10px 14px;border-radius:16px;max-width:85%;}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

.inputArea{padding:10px;border-top:1px solid #eee;}
textarea{width:100%;height:60px;border-radius:12px;padding:10px;}

.btnRow{display:flex;gap:6px;margin-top:6px;}
button{flex:1;border:none;border-radius:12px;padding:8px;font-weight:bold;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">
<img src="https://i.postimg.cc/hjzSWJd0/jennai.png">
</div>

<div id="widget">
<div class="header">
<span>JennAI ULTIMATE MAX</span>
<span onclick="closeWidget()">✖</span>
</div>

<div class="chat" id="chat"></div>

<div class="inputArea">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>
</div>
</div>

<script>

/* ===== BASIS ===== */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");

let lastOutput="";

function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ===== NORMALIZE (SMART ENGINE) ===== */
function normalize(t){

t=t.toLowerCase();

/* Zustand */
t=t.replace(/az schlecht|mies|sehr schlecht/g,"az reduziert");
t=t.replace(/müde|schwach|kraftlos/g,"erschöpft");

/* Orientierung */
t=t.replace(/zeitlich.*desorientiert/g,"desorientiert zeit");
t=t.replace(/örtlich.*desorientiert/g,"desorientiert ort");
t=t.replace(/verwirrt|komisch/g,"desorientiert");

/* Verhalten */
t=t.replace(/irrt herum|läuft herum|wandert/g,"unruhig");
t=t.replace(/weglauftendenz|läuft weg/g,"weglaufen");
t=t.replace(/schreit|brüllt/g,"laut");

/* Essen/Trinken */
t=t.replace(/isst.*nicht|nimmt nichts/g,"essen verweigert");
t=t.replace(/trinkt.*nicht/g,"trinken unzureichend");

/* Emotion */
t=t.replace(/weinerlich|traurig/g,"emotional");

/* Ausscheidung */
t=t.replace(/urin.*überall|eingenässt/g,"harninkontinenz");
t=t.replace(/stuhl.*verschmiert/g,"stuhl");

/* Schmerzen (alle wichtigen Bereiche) */
const painAreas=["bein","arm","rücken","kopf","bauch","schulter","knie","fuß","hüfte","nacken","brust"];

painAreas.forEach(p=>{
let regex=new RegExp(p+"schmerzen|schmerzen im "+p,"g");
t=t.replace(regex,"schmerz "+p);
});

return t;
}

/* ===== REPORT ENGINE ===== */
function buildReport(t){

let r=[];
let risks=new Set();

/* Zustand */
if(t.includes("az reduziert")){
r.push("Der Allgemeinzustand zeigte sich reduziert");
risks.add("allgemeine Schwäche");
}
if(t.includes("erschöpft")){
r.push("Bewohner wirkte körperlich erschöpft");
}

/* Orientierung */
if(t.includes("desorientiert zeit")) r.push("Bewohner zeigte sich zeitlich desorientiert");
if(t.includes("desorientiert ort")) r.push("Bewohner zeigte sich örtlich desorientiert");
if(t.includes("desorientiert")) r.push("Bewohner zeigte sich desorientiert");

/* Schmerz */
const painMap={
bein:"unteren Extremität",
arm:"oberen Extremität",
rücken:"Rückenbereich",
kopf:"Kopfbereich",
bauch:"Abdomen",
schulter:"Schulterbereich",
knie:"Kniebereich",
fuß:"Fußbereich",
hüfte:"Hüftbereich",
nacken:"Nackenbereich",
brust:"Thoraxbereich"
};

for(let k in painMap){
if(t.includes("schmerz "+k)){
r.push("Bewohner äußerte Schmerzen im Bereich der "+painMap[k]);
risks.add("Schmerzbelastung");
}
}

/* Verhalten */
if(t.includes("unruhig")){
r.push("Es zeigte sich motorische Unruhe mit Umhergehen");
risks.add("Sturzrisiko");
}
if(t.includes("weglaufen")){
r.push("Es bestand eine Weglauftendenz");
risks.add("Eigengefährdung");
}
if(t.includes("laut")){
r.push("Wiederholte Lautäußerungen wurden beobachtet");
}

/* Ernährung */
if(t.includes("essen verweigert")){
r.push("Die Nahrungsaufnahme wurde nicht angenommen");
risks.add("Mangelernährung");
}
if(t.includes("trinken unzureichend")){
r.push("Die Trinkmenge war unzureichend");
risks.add("Dehydratation");
}

/* Ausscheidung */
if(t.includes("harninkontinenz")) r.push("Harninkontinenz wurde festgestellt");
if(t.includes("stuhl")) r.push("Stuhlkontamination wurde festgestellt");

/* Emotion */
if(t.includes("emotional")) r.push("Bewohner zeigte sich emotional belastet");

/* FINAL */
let out=r.join(". ") + ".";

if(risks.size){
out+=" Es bestehen Risiken hinsichtlich "+[...risks].join(", ")+".";
}

if(out==="." || out.trim()===""){
out="Es zeigten sich keine relevanten Auffälligkeiten.";
}

return out;
}

/* ===== KI ===== */
async function hfAI(text){

try{
let res=await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct",{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:`Erstelle einen professionellen Pflegebericht aus Stichwörtern, sachlich, mehrere Sätze, Fachsprache: ${text}`
})
});

let data=await res.json();
if(Array.isArray(data)) return data[0]?.generated_text;

}catch(e){return null;}
}

/* ===== GENERATE ===== */
async function generate(){

let raw=input.value;
if(!raw) return;

addMessage(raw,"user");

let norm=normalize(raw);

let report=buildReport(norm);
addMessage(report,"ai");

lastOutput=report;

/* KI */
let ai=await hfAI(norm);
if(ai && ai.length>report.length){
chat.lastChild.innerText=ai;
lastOutput=ai;
}

input.value="";
}

/* COPY */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
}

/* RESET */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
}

</script>

</body>
</html>
