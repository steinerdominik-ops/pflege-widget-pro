<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Pflege KI GRATIS</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
#openBtn{position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;}
#widget{
position:fixed;bottom:20px;right:20px;width:580px;height:720px;
background:white;border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,0.3);
display:none;flex-direction:column;
}
.header{background:#0f4c81;color:white;padding:12px;display:flex;justify-content:space-between;}
.content{padding:12px;flex:1;overflow:auto;}

textarea{width:100%;height:120px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;}

button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:bold;}
.generate{background:#0f4c81;color:white;}
.ki{background:#8e44ad;color:white;}
.learn{background:#f39c12;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header">
<span>JennAI – GRATIS KI</span>
<span onclick="closeWidget()">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="ki" onclick="generateKI()">🤖 ChatGPT nutzen</button>
<button class="learn" onclick="learn()">🧠 Ergebnis speichern</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* UI */
function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

/* MEMORY */
function getMemory(){
return JSON.parse(localStorage.getItem("pflegeKI")) || [];
}
function saveMemory(m){
localStorage.setItem("pflegeKI", JSON.stringify(m));
}

/* GENERATE */
function generate(){

let t = input.value.toLowerCase();
let memory = getMemory();

/* gelernt */
for(let m of memory){
if(t.includes(m.input)){
output.value = m.output + " (gelernt)";
return;
}
}

/* pseudo KI */
let text="";

if(t.includes("schlecht")) text+="Allgemeinzustand reduziert. ";
if(t.includes("trinkt nicht")) text+="Flüssigkeitsaufnahme verweigert. ";
if(t.includes("läuft herum")) text+="motorisch unruhig. ";
if(t.includes("weglaufen")) text+="Weglauftendenz vorhanden. ";

if(!text) text="Keine relevanten Auffälligkeiten.";

output.value=text;
}

/* CHATGPT */
function generateKI(){

let text = input.value;

let prompt = `
Schreibe einen professionellen Pflegebericht:
- sachlich
- Fachsprache
- Risiken

Text:
${text}
`;

navigator.clipboard.writeText(prompt);
window.open("https://chat.openai.com");
}

/* LEARN */
function learn(){

let m = getMemory();

m.push({
input: input.value.toLowerCase(),
output: output.value
});

saveMemory(m);

alert("Gespeichert");
}

</script>
</body>
</html>
