<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pflegebericht Professional</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fa; }

/* ================= FLOATING BUTTON ================= */

#openBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
background:#004cff;
color:white;
border:none;
border-radius:50%;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

/* ================= WIDGET ================= */

#widget{
position:fixed;
bottom:20px;
right:20px;
width:470px;
height:680px;
background:white;
border-radius:18px;
box-shadow:0 15px 50px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
z-index:1001;
}

.header{
background:#004cff;
color:white;
padding:15px;
cursor:move;
border-radius:18px 18px 0 0;
font-weight:bold;
font-size:16px;
}

.content{
padding:15px;
overflow:auto;
flex:1;
}

.option{
padding:8px;
margin:5px 0;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.option:hover{
background:#eef3ff;
}

.option.selected{
background:#004cff;
color:white;
}

textarea{
width:100%;
height:100px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
resize:none;
font-size:14px;
}

button{
padding:9px;
border:none;
border-radius:8px;
margin-top:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.generate{ background:#004cff; color:white; }
.copy{ background:#2ecc71; color:white; }
.reset{ background:#e74c3c; color:white; }
.mode{ background:#555; color:white; }

</style>
</head>

<body>

<button id="openBtn">PB</button>

<div id="widget">

<div class="header" id="dragHeader">Pflegebericht Generator</div>

<div class="content">

<button class="mode" onclick="toggleMode()">Modus wechseln (Standard / Schnell)</button>

<h4>Kategorie</h4>

<div class="option" onclick="selectCategory(this)">Allgemeiner Pflegebericht</div>
<div class="option" onclick="selectCategory(this)">Essen & Trinken</div>
<div class="option" onclick="selectCategory(this)">Medikamente</div>
<div class="option" onclick="selectCategory(this)">Mobilisation</div>
<div class="option" onclick="selectCategory(this)">Sturzereignis</div>

<h4>Stichwörter (mit Komma trennen)</h4>
<textarea id="keywords" placeholder="z.B. AZ schlecht, verweigert Essen, sehr unruhig"></textarea>

<button class="generate" onclick="generate()">Bericht generieren</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output" placeholder="Hier erscheint der professionelle Pflegebericht..."></textarea>

</div>
</div>

<script>

/* ================= SETUP ================= */

let mode="standard";
let selectedCategory="";
let widget=document.getElementById("widget");
let openBtn=document.getElementById("openBtn");

/* ================= OPEN ================= */

openBtn.onclick=function(){
widget.style.display="flex";
openBtn.style.display="none";
};

/* ================= MODE ================= */

function toggleMode(){
mode = mode==="standard" ? "schnell" : "standard";
alert("Aktueller Modus: "+mode);
}

/* ================= CATEGORY ================= */

function selectCategory(el){
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
selectedCategory=el.innerText;
}

/* ================= GENERATOR ================= */

function generate(){

let rawInput=document.getElementById("keywords").value;

/* --- BASIS-RECHTSCHREIB & NEUTRALISIERUNG --- */

rawInput=rawInput
.replace(/az/gi,"Allgemeinzustand")
.replace(/schlecht/gi,"reduziert")
.replace(/sehr/gi,"deutlich")
.replace(/viel/gi,"wiederholt")
.replace(/nix/gi,"nicht")
.replace(/verweigert/gi,"nicht angenommen")
.replace(/will nicht/gi,"lehnt ab")
.replace(/isst/gi,"isst");

/* --- KEYWORDS --- */

let words=rawInput
.split(",")
.map(w=>w.trim().toLowerCase())
.filter(w=>w!="");

if(mode==="standard" && selectedCategory===""){
document.getElementById("output").value="Bitte Kategorie auswählen.";
return;
}

/* --- TEXTBAUSTEINE --- */

let intro="Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen versorgt.";
let condition="", nutrition="", mobility="", behavior="", medication="", event="", other="";

words.forEach(word=>{

if(word.includes("allgemeinzustand") || word.includes("reduziert")){
condition="Der Allgemeinzustand zeigte sich reduziert.";
}

else if(word.includes("vital stabil")){
condition="Der Allgemeinzustand zeigte sich vital stabil.";
}

else if(word.includes("nicht angenommen") && word.includes("essen")){
nutrition="Nahrungsaufnahme wurde angeboten, jedoch nicht angenommen.";
}

else if(word.includes("nicht angenommen") && word.includes("trinken")){
nutrition+=" Flüssigkeitsaufnahme wurde angeboten, jedoch nicht angenommen.";
}

else if(word.includes("trinkmenge ausreichend")){
nutrition="Die Trinkmenge wurde als ausreichend dokumentiert.";
}

else if(word.includes("mobilisiert")){
mobility="Mobilisation erfolgte entsprechend vorhandener Ressourcen.";
}

else if(word.includes("mit unterstützung")){
mobility="Maßnahmen erfolgten mit Unterstützung.";
}

else if(word.includes("unruhig")){
behavior="Bewohner/in zeigte sich deutlich unruhig.";
}

else if(word.includes("schreit") || word.includes("laut")){
behavior+=" Wiederholte Lautäußerungen wurden beobachtet.";
}

else if(word.includes("medikament")){
medication="Medikamentengabe erfolgte gemäß ärztlicher Verordnung.";
}

else if(word.includes("sturz")){
event="Ein Sturzereignis wurde dokumentiert. Beobachtung eingeleitet.";
}

else{
other+=word.charAt(0).toUpperCase()+word.slice(1)+". ";
}

});

/* --- TEXTAUFBAU --- */

let finalText="";

if(mode==="standard"){
finalText+=intro+"\n\n";
}

if(selectedCategory && mode==="standard"){
finalText+="Kategorie: "+selectedCategory+".\n\n";
}

if(condition) finalText+=condition+"\n";
if(nutrition) finalText+=nutrition+"\n";
if(mobility) finalText+=mobility+"\n";
if(behavior) finalText+=behavior+"\n";
if(medication) finalText+=medication+"\n";
if(event) finalText+=event+"\n";
if(other) finalText+=other+"\n";

finalText+="\nEs zeigten sich keine weiteren dokumentationsrelevanten Auffälligkeiten.";

document.getElementById("output").value=finalText;

}

/* ================= COPY ================= */

function copyText(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

/* ================= RESET ================= */

function resetAll(){
document.getElementById("keywords").value="";
document.getElementById("output").value="";
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
selectedCategory="";
}

/* ================= DRAG WIDGET ================= */

let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});

document.addEventListener("mouseup",function(){
isDown=false;
});

document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

/* ================= DRAG BUTTON ================= */

let btnOffsetX, btnOffsetY, btnDown=false;

openBtn.addEventListener("mousedown",function(e){
btnDown=true;
btnOffsetX=openBtn.offsetLeft - e.clientX;
btnOffsetY=openBtn.offsetTop - e.clientY;
});

document.addEventListener("mousemove",function(e){
if(!btnDown) return;
openBtn.style.left=(e.clientX + btnOffsetX)+"px";
openBtn.style.top=(e.clientY + btnOffsetY)+"px";
openBtn.style.bottom="auto";
openBtn.style.right="auto";
});

document.addEventListener("mouseup",function(){
btnDown=false;
});

</script>

</body>
</html>
