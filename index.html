<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pflegebericht Professional</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fa; }

#openBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
background:#003cff;
color:white;
border:none;
border-radius:50%;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

#widget{
position:fixed;
bottom:20px;
right:20px;
width:500px;
height:720px;
background:white;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
display:none;
flex-direction:column;
z-index:1001;
}

.header{
background:#003cff;
color:white;
padding:16px;
cursor:move;
border-radius:18px 18px 0 0;
font-weight:bold;
}

.content{
padding:16px;
overflow:auto;
flex:1;
}

.option{
padding:8px;
margin:5px 0;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
}

.option.selected{
background:#003cff;
color:white;
}

textarea{
width:100%;
height:110px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
resize:none;
font-size:14px;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.generate{ background:#003cff; color:white; }
.copy{ background:#2ecc71; color:white; }
.reset{ background:#e74c3c; color:white; }

</style>
</head>

<body>

<button id="openBtn">PB</button>

<div id="widget">

<div class="header" id="dragHeader">Pflegebericht Generator</div>

<div class="content">

<h4>Kategorie (optional)</h4>

<div class="option" onclick="selectCategory(this)">Allgemeiner Pflegebericht</div>
<div class="option" onclick="selectCategory(this)">Essen & Trinken</div>
<div class="option" onclick="selectCategory(this)">Mobilisation</div>
<div class="option" onclick="selectCategory(this)">Medikamente</div>
<div class="option" onclick="selectCategory(this)">Sturzereignis</div>

<h4>Beobachtungen / Stichwörter</h4>
<textarea id="keywords" placeholder="z.B. AZ reduziert, verweigert Essen und Trinken, mobilisiert mit Unterstützung"></textarea>

<button class="generate" onclick="generate()">Pflegebericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output" placeholder="Hier erscheint der professionell formulierte Pflegebericht..."></textarea>

</div>
</div>

<script>

let selectedCategory="";
let widget=document.getElementById("widget");
let openBtn=document.getElementById("openBtn");

openBtn.onclick=function(){
widget.style.display="flex";
openBtn.style.display="none";
};

function selectCategory(el){
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
selectedCategory=el.innerText;
}

function generate(){

let input=document.getElementById("keywords").value.toLowerCase();

/* Neutralisierung */
input=input
.replace(/az/gi,"Allgemeinzustand")
.replace(/schlecht/gi,"reduziert")
.replace(/verweigert/gi,"nicht angenommen")
.replace(/will nicht/gi,"lehnt ab")
.replace(/sehr/gi,"deutlich")
.replace(/nix/gi,"nicht");

/* Analyse */

let report=[];
report.push("Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen versorgt.");

if(selectedCategory){
report.push("Dokumentationsbereich: "+selectedCategory+".");
}

/* Zustand */

if(input.includes("allgemeinzustand") || input.includes("reduziert")){
report.push("Der Allgemeinzustand zeigte sich reduziert.");
}

if(input.includes("vital stabil")){
report.push("Der Allgemeinzustand zeigte sich vital stabil.");
}

/* Ernährung */

if(input.includes("nicht angenommen") && input.includes("essen")){
report.push("Die angebotene Nahrungsaufnahme wurde nicht angenommen.");
}

if(input.includes("nicht angenommen") && input.includes("trinken")){
report.push("Die angebotene Flüssigkeitsaufnahme wurde nicht angenommen.");
}

if(input.includes("trinkmenge ausreichend")){
report.push("Die Trinkmenge wurde als ausreichend dokumentiert.");
}

/* Mobilität */

if(input.includes("mobilisiert")){
if(input.includes("unterstützung")){
report.push("Die Mobilisation erfolgte mit Unterstützung.");
} else {
report.push("Die Mobilisation erfolgte entsprechend vorhandener Ressourcen.");
}
}

/* Verhalten */

if(input.includes("unruhig")){
report.push("Bewohner/in zeigte sich deutlich unruhig.");
}

if(input.includes("laut") || input.includes("schreit")){
report.push("Wiederholte Lautäußerungen wurden beobachtet.");
}

/* Medikation */

if(input.includes("medikament")){
report.push("Die Medikamentengabe erfolgte gemäß ärztlicher Verordnung.");
}

/* Sturz */

if(input.includes("sturz")){
report.push("Ein Sturzereignis wurde dokumentiert. Eine entsprechende Beobachtung wurde eingeleitet.");
}

/* Abschluss */

report.push("Weitere dokumentationsrelevante Auffälligkeiten zeigten sich nicht.");

document.getElementById("output").value = report.join("\n\n");

}

function copyText(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

function resetAll(){
document.getElementById("keywords").value="";
document.getElementById("output").value="";
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
selectedCategory="";
}

/* Drag Widget */

let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});

document.addEventListener("mouseup",function(){ isDown=false; });

document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

</script>

</body>
</html>
