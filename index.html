<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jenn AI FULL</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#widget{
position:fixed;bottom:20px;right:20px;width:420px;height:700px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:flex;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{
flex:1;padding:12px;overflow:auto;
display:flex;flex-direction:column;gap:10px;
}

.msg{
padding:10px 14px;border-radius:16px;max-width:85%;
white-space:pre-line;
}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

textarea{
width:100%;height:70px;border-radius:12px;
padding:10px;resize:none;
}

button{
width:100%;margin-top:6px;
border:none;border-radius:12px;
padding:10px;font-weight:bold;
background:#0f4c81;color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="widget">
<div class="header">
<span>Jenn AI FULL</span>
</div>

<div class="chat" id="chat"></div>

<div style="padding:10px;">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>
<button onclick="generate()">Generieren</button>
</div>
</div>

<script>

/* ================= CONFIG ================= */
const HF_API_KEY = "DEIN_HF_KEY";
const MODEL_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2";

/* ================= UI ================= */
const input=document.getElementById("input");
const chat=document.getElementById("chat");

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ================= FULL KI ================= */
async function callAI(text){

const prompt = `
Du bist eine diplomierte Pflegefachkraft.

AUFGABE:
1. Analysiere den Text vollständig
2. Verstehe jedes Detail
3. Erstelle professionelle Pflegedokumentation
4. Erkenne ALLE Risiken

FORMAT:

Dokumentation:
<text>

Risiken:
- ...
- ...

Maßnahmen:
- ...
- ...

REGELN:
- medizinisch korrekt
- keine Erklärungen
- keine Wiederholungen
- kurze klare Sätze
- deutsche Fachsprache
`;

const response = await fetch(MODEL_URL, {
method: "POST",
headers: {
"Authorization": "Bearer " + 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,
"Content-Type": "application/json"
},
body: JSON.stringify({
inputs: prompt + "\n\n" + text,
parameters: {
max_new_tokens: 300,
temperature: 0.4
}
})
});

const data = await response.json();

return data[0].generated_text.replace(prompt,"").trim();
}

/* ================= GENERATE ================= */
async function generate(){

let raw=input.value.trim();
if(!raw) return;

addMessage(raw,"user");

addMessage("KI analysiert...","ai");

let result = await callAI(raw);

/* letzte Nachricht ersetzen */
chat.lastChild.innerText = result;

input.value="";
}

/* ENTER SENDEN */
input.addEventListener("keydown", function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
generate();
}
});

</script>

</body>
</html>
