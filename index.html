<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jenn AI</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;width:80px;height:80px;
border-radius:50%;overflow:hidden;cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
#openBtn img{width:100%;height:100%;object-fit:cover;}

#widget{
position:fixed;bottom:20px;right:20px;width:420px;height:680px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{flex:1;padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px;}

.msg{padding:10px 14px;border-radius:16px;max-width:85%;}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

.riskBox{
background:#fff3cd;
border-left:5px solid #ff9800;
padding:10px;
font-size:13px;
margin:8px;
border-radius:10px;
white-space:pre-line;
}

.inputArea{padding:10px;border-top:1px solid #eee;}
textarea{width:100%;height:60px;border-radius:12px;padding:10px;}

.btnRow{display:flex;gap:6px;margin-top:6px;}
button{flex:1;border:none;border-radius:12px;padding:8px;font-weight:bold;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">
<img src="https://i.postimg.cc/hjzSWJd0/jennai.png">
</div>

<div id="widget">
<div class="header">
<span>Jenn AI</span>
<span onclick="closeWidget()">✖</span>
</div>

<div id="riskPanel"></div>
<div class="chat" id="chat"></div>

<div class="inputArea">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>
</div>
</div>

<script>

/* UI */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");
const riskPanel=document.getElementById("riskPanel");

let lastOutput="";

function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* RISIKEN */
function detectRisks(t){
t=t.toLowerCase();
let r=[];

if(/unruhig|irrt|weglaufen|wandert/.test(t)) r.push("Sturzrisiko");
if(/trink|flüssig/.test(t)&&/nicht|wenig/.test(t)) r.push("Dehydratation");
if(/ess|nahrung/.test(t)&&/nicht|verwe/.test(t)) r.push("Mangelernährung");
if(/schmerz|aua/.test(t)) r.push("Schmerzbelastung");
if(/stuhl|urin|inkontinenz/.test(t)) r.push("Hautschädigung");
if(/atem|luft/.test(t)) r.push("Atemproblem");

return [...new Set(r)];
}

/* 🔥 ECHTE KI (ALLE WÖRTER) */
async function realAI(text){

try{
let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"openrouter/auto",
messages:[
{
role:"system",
content:`Du bist eine professionelle Pflegefachkraft.

AUFGABE:
Verarbeite jede Eingabe vollständig – auch mit Tippfehlern, Dialekt oder unklarer Sprache.

Erstelle einen vollständigen Pflegebericht:

- ALLE Informationen verwenden
- keine Information auslassen
- keine Interpretation hinzufügen
- sachlich und fachlich korrekt
- medizinische Fachsprache
- vollständige Sätze
- KEINE Risiken erwähnen

STRUKTUR:
Allgemeinzustand → Orientierung → Verhalten → körperliche Beobachtungen → Maßnahmen
`
},
{
role:"user",
content:text
}
]
})
});

let data=await res.json();

if(data?.choices?.[0]?.message?.content){
return data.choices[0].message.content;
}

return "Keine KI Antwort";

}catch(e){
return "Verbindungsfehler – prüfe API Key";
}
}

/* GENERATE */
async function generate(){

let raw=input.value;
if(!raw) return;

addMessage(raw,"user");

/* RISIKEN */
let risks=detectRisks(raw);
riskPanel.innerHTML="";

if(risks.length){
let box=document.createElement("div");
box.className="riskBox";
box.innerText="⚠ Risiken:\n"+risks.join("\n");
riskPanel.appendChild(box);
}

/* KI */
let result=await realAI(raw);

addMessage(result,"ai");
lastOutput=result;

input.value="";
}

/* COPY */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
}

/* RESET */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
riskPanel.innerHTML="";
}

</script>

</body>
</html>
