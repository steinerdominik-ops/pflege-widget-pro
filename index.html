<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI</title>

<style>
body{
margin:0;
font-family:Inter, Arial;
background:#eef2f7;
}

/* ===== MASCOT BUTTON ===== */
#openBtn{
position:fixed;
bottom:20px;
right:20px;
width:80px;
height:80px;
border-radius:50%;
overflow:hidden;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

#openBtn:hover{
transform:scale(1.05);
}

#openBtn img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== CHAT POPUP ===== */
#widget{
position:fixed;
bottom:20px;
right:20px;
width:380px;
height:600px;
background:white;
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;
flex-direction:column;
overflow:hidden;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;
padding:14px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

/* CHAT */
.chat{
flex:1;
padding:12px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

/* BUBBLES */
.msg{
padding:10px 14px;
border-radius:16px;
max-width:80%;
line-height:1.4;
}

.user{
background:#e3f2fd;
align-self:flex-end;
}

.ai{
background:#f1f3f6;
align-self:flex-start;
}

/* INPUT AREA */
.inputArea{
padding:10px;
border-top:1px solid #eee;
display:flex;
flex-direction:column;
gap:6px;
}

textarea{
resize:none;
border-radius:12px;
border:1px solid #ccc;
padding:10px;
height:60px;
}

/* BUTTONS */
.btnRow{
display:flex;
gap:6px;
}

button{
flex:1;
border:none;
border-radius:12px;
padding:8px;
font-weight:bold;
cursor:pointer;
}

.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}

</style>
</head>

<body>

<!-- MASCOT BUTTON -->
<div id="openBtn" onclick="openWidget()">
<img src="https://i.imgur.com/6VBx3io.png">
</div>

<!-- CHAT -->
<div id="widget">

<div class="header">
<span>JennAI</span>
<span onclick="closeWidget()">✖</span>
</div>

<div class="chat" id="chat"></div>

<div class="inputArea">

<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>

</div>

</div>

<script>

/* DOM */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");

let lastOutput="";

/* UI */
function openWidget(){
widget.style.display="flex";
openBtn.style.display="none";
}
function closeWidget(){
widget.style.display="none";
openBtn.style.display="block";
}

/* MESSAGE */
function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ================= PSEUDO KI ================= */
function localAI(text){

text=text.toLowerCase();

let out=[];

if(text.includes("az") && text.includes("schlecht"))
out.push("Der Allgemeinzustand zeigte sich deutlich reduziert");

if(text.includes("stuhl") && text.includes("verschmiert"))
out.push("Stuhlkontamination festgestellt");

if(text.includes("irrt") || text.includes("läuft"))
out.push("motorische Unruhe mit Umhergehen");

if(text.includes("müde"))
out.push("wirkte somnolent");

if(text.includes("schreit"))
out.push("wiederholte Lautäußerungen");

if(text.includes("duschen") && text.includes("verweigert"))
out.push("Körperpflege nicht angenommen");

if(text.includes("trinkt") && text.includes("nicht"))
out.push("Flüssigkeitsaufnahme unzureichend");

if(!out.length) return "Keine relevanten Auffälligkeiten.";

return out.join(". ") + ".";
}

/* ================= KI ================= */
async function hfAI(text){

try{
let res = await fetch(
"https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct",
{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:`
Du bist Pflegefachkraft.
Schreibe einen professionellen Pflegebericht in Fachsprache:

${text}
`
})
});

let data = await res.json();

if(Array.isArray(data)){
return data[0]?.generated_text;
}

}catch(e){return null;}

}

/* ================= GENERATE ================= */
async function generate(){

let text=input.value;

if(!text) return;

/* USER MSG */
addMessage(text,"user");

/* LOCAL */
let local=localAI(text);
addMessage(local,"ai");

lastOutput=local;

/* KI */
let ai=await hfAI(text);

if(ai && ai.length>local.length){
chat.lastChild.innerText=ai;
lastOutput=ai;
}

input.value="";
}

/* COPY */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
}

/* RESET */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
}

</script>

</body>
</html>
