<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pflegebericht Professional Resizable</title>

<style>
body { margin:0; font-family:Arial; background:#f4f6fa; }

/* ===== Floating Button ===== */

#openBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
background:#003cff;
color:white;
border:none;
border-radius:50%;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

/* ===== Widget ===== */

#widget{
position:fixed;
bottom:20px;
right:20px;
width:480px;
height:600px;
min-width:380px;
min-height:450px;
background:white;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
display:none;
flex-direction:column;
z-index:1001;
resize:both;
overflow:hidden;
}

.header{
background:#003cff;
color:white;
padding:14px;
cursor:move;
border-radius:18px 18px 0 0;
font-weight:bold;
}

.content{
padding:14px;
overflow:auto;
flex:1;
}

textarea{
width:100%;
height:120px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
resize:none;
font-size:14px;
}

button{
padding:9px;
border:none;
border-radius:8px;
margin-top:8px;
width:100%;
cursor:pointer;
font-weight:bold;
}

.generate{ background:#003cff; color:white; }
.copy{ background:#2ecc71; color:white; }
.reset{ background:#e74c3c; color:white; }

</style>
</head>

<body>

<button id="openBtn">PB</button>

<div id="widget">

<div class="header" id="dragHeader">Pflegebericht Generator</div>

<div class="content">

<h4>Freitext / Beobachtung</h4>
<textarea id="keywords" placeholder="z.B. az reduziert duschen nicht angenommen stuhlgang erfolgt mobilisiert mit unterstützung"></textarea>

<button class="generate" onclick="generate()">Pflegebericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output" placeholder="Hier erscheint der professionelle Pflegebericht..."></textarea>

</div>
</div>

<script>

let widget=document.getElementById("widget");
let openBtn=document.getElementById("openBtn");

openBtn.onclick=function(){
widget.style.display="flex";
openBtn.style.display="none";
};

function generate(){

let input=document.getElementById("keywords").value.toLowerCase();

input=input
.replace(/az/g,"allgemeinzustand")
.replace(/schlecht/g,"reduziert")
.replace(/verweigert/g,"nicht angenommen")
.replace(/nix/g,"nicht");

let report=[];
report.push("Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen betreut.");

/* Allgemeinzustand */
if(input.includes("reduziert")) report.push("Der Allgemeinzustand zeigte sich reduziert.");
if(input.includes("stabil")) report.push("Der Allgemeinzustand zeigte sich vital stabil.");
if(input.includes("orientiert")) report.push("Bewohner/in war wach und orientiert.");
if(input.includes("desorientiert")) report.push("Bewohner/in zeigte sich zeitweise desorientiert.");

/* Körperpflege */
if(input.includes("duschen") && input.includes("nicht angenommen"))
report.push("Die angebotene Körperpflege in Form des Duschens wurde nicht angenommen.");
else if(input.includes("duschen"))
report.push("Die Körperpflege in Form des Duschens wurde durchgeführt.");

if(input.includes("teilwasch")) report.push("Teilwaschung wurde durchgeführt.");

/* Ausscheidung */
if(input.includes("stuhlgang erfolgt"))
report.push("Stuhlgang erfolgte ohne Besonderheiten.");
if(input.includes("kein stuhl"))
report.push("Es erfolgte kein Stuhlgang.");
if(input.includes("durchfall"))
report.push("Es zeigte sich Durchfall.");
if(input.includes("obstipation"))
report.push("Hinweis auf Obstipation.");
if(input.includes("inkontinenz"))
report.push("Inkontinenzversorgung wurde durchgeführt.");
if(input.includes("urin unauffällig"))
report.push("Miktion unauffällig.");

/* Ernährung */
if(input.includes("essen") && input.includes("nicht angenommen"))
report.push("Die angebotene Nahrungsaufnahme wurde nicht angenommen.");
if(input.includes("trinken") && input.includes("nicht angenommen"))
report.push("Die angebotene Flüssigkeitsaufnahme wurde nicht angenommen.");
if(input.includes("trinkmenge ausreichend"))
report.push("Die Trinkmenge wurde als ausreichend dokumentiert.");

/* Mobilität */
if(input.includes("mobilisiert") && input.includes("unterstützung"))
report.push("Die Mobilisation erfolgte mit Unterstützung.");
else if(input.includes("mobilisiert"))
report.push("Die Mobilisation erfolgte entsprechend vorhandener Ressourcen.");
if(input.includes("bett"))
report.push("Bewohner/in war überwiegend bettlägerig.");

/* Verhalten */
if(input.includes("unruhig"))
report.push("Bewohner/in zeigte sich deutlich unruhig.");
if(input.includes("herausfordernd"))
report.push("Herausforderndes Verhalten wurde beobachtet.");

/* Medikamente */
if(input.includes("medikament"))
report.push("Die Medikamentengabe erfolgte gemäß ärztlicher Verordnung.");

/* Sturz */
if(input.includes("sturz"))
report.push("Ein Sturzereignis wurde dokumentiert. Eine entsprechende Beobachtung wurde eingeleitet.");

report.push("Weitere dokumentationsrelevante Auffälligkeiten zeigten sich nicht.");

document.getElementById("output").value = report.join("\n\n");

}

function copyText(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

function resetAll(){
document.getElementById("keywords").value="";
document.getElementById("output").value="";
}

/* Drag Widget */

let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});

document.addEventListener("mouseup",function(){ isDown=false; });

document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

</script>

</body>
</html>
