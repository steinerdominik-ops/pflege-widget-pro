<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JennAI</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#eef2f7;
}

/* ===== JennAI Floating Nurse ===== */

#openBtn{
position:fixed;
bottom:20px;
right:20px;
font-size:48px;
cursor:pointer;
z-index:1000;
animation: float 3s ease-in-out infinite;
filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.3));
}

/* Schwebeeffekt */
@keyframes float{
0% { transform: translateY(0px); }
50% { transform: translateY(-8px); }
100% { transform: translateY(0px); }
}

/* Winken */
@keyframes wave{
0% { transform: rotate(0deg); }
20% { transform: rotate(15deg); }
40% { transform: rotate(-10deg); }
60% { transform: rotate(15deg); }
80% { transform: rotate(-5deg); }
100% { transform: rotate(0deg); }
}

.wave{
display:inline-block;
animation: wave 2.5s infinite;
transform-origin: 70% 70%;
}

/* ===== JennAI Window ===== */

#widget{
position:fixed;
bottom:20px;
right:20px;
width:520px;
height:600px;
min-width:420px;
min-height:480px;
background:white;
border-radius:14px;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
display:none;
flex-direction:column;
resize:both;
overflow:auto;
z-index:1001;
border:1px solid #d0d7e2;
}

/* Header */
.header{
background:linear-gradient(90deg,#0f4c81,#1f6fb2);
color:white;
padding:12px;
cursor:move;
font-weight:bold;
border-radius:14px 14px 0 0;
}

/* Content */
.content{
padding:14px;
flex:1;
overflow:auto;
}

/* Inputs */
textarea{
width:100%;
height:140px;
border-radius:8px;
border:1px solid #c9d3e0;
padding:8px;
margin-top:8px;
resize:none;
font-size:14px;
}

/* Buttons */
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.generate{
background:#0f4c81;
color:white;
}

.copy{
background:#27ae60;
color:white;
}

.reset{
background:#c0392b;
color:white;
}

</style>
</head>

<body>

<!-- JennAI floating nurse -->
<div id="openBtn" onclick="openWidget()">
<span class="wave">👩‍⚕️</span>
</div>

<div id="widget">

<div class="header" id="dragHeader">
JennAI – Digitale Pflegeassistenz
</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben z.B. az scheisse stuhl überall mobilisiert mit unterstützung"></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* Öffnen */
function openWidget(){
document.getElementById("widget").style.display="flex";
document.getElementById("openBtn").style.display="none";
}

/* Neutralisierungs Engine */
function normalize(input){

const replacements = {

"scheisse":"stark reduziert",
"mies":"reduziert",
"katastrophe":"stark reduziert",
"total fertig":"erschöpft",
"am ende":"erschöpft",
"stuhl überall":"stuhl kontaminiert",
"urin überall":"harn kontaminiert",
"isst nix":"nahrungsaufnahme nicht angenommen",
"trinkt nix":"flüssigkeitsaufnahme nicht angenommen",
"schreit rum":"lautäußerungen",
"aggressiv":"herausforderndes verhalten"

};

for (let key in replacements){
let regex = new RegExp(key,"g");
input = input.replace(regex,replacements[key]);
}

return input;
}

function generate(){

let input=document.getElementById("input").value.toLowerCase();
input=normalize(input);

let r=[];
r.push("Bewohner/in wurde im Rahmen der geplanten pflegerischen Maßnahmen betreut.");

if(input.includes("stark reduziert"))
r.push("Der Allgemeinzustand zeigte sich stark reduziert.");
else if(input.includes("reduziert"))
r.push("Der Allgemeinzustand zeigte sich reduziert.");

if(input.includes("erschöpft"))
r.push("Bewohner/in wirkte deutlich erschöpft.");

if(input.includes("stuhl kontaminiert"))
r.push("Es zeigte sich eine Stuhlkontamination.");

if(input.includes("harn kontaminiert"))
r.push("Es zeigte sich eine Harnkontamination.");

if(input.includes("nahrungsaufnahme nicht angenommen"))
r.push("Die angebotene Nahrungsaufnahme wurde nicht angenommen.");

if(input.includes("flüssigkeitsaufnahme nicht angenommen"))
r.push("Die angebotene Flüssigkeitsaufnahme wurde nicht angenommen.");

if(input.includes("mobilisiert") && input.includes("unterstützung"))
r.push("Die Mobilisation erfolgte mit Unterstützung.");
else if(input.includes("mobilisiert"))
r.push("Die Mobilisation erfolgte entsprechend vorhandener Ressourcen.");

if(input.includes("lautäußerungen"))
r.push("Wiederholte Lautäußerungen wurden beobachtet.");

if(input.includes("herausforderndes verhalten"))
r.push("Herausforderndes Verhalten wurde beobachtet.");

r.push("Weitere dokumentationsrelevante Auffälligkeiten zeigten sich nicht.");

document.getElementById("output").value=r.join("\n\n");
}

/* Copy */
function copyText(){
let out=document.getElementById("output");
out.select();
document.execCommand("copy");
alert("Bericht kopiert");
}

/* Reset */
function resetAll(){
document.getElementById("input").value="";
document.getElementById("output").value="";
}

/* Drag Window */
let dragItem=document.getElementById("widget");
let dragHeader=document.getElementById("dragHeader");
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=dragItem.offsetLeft - e.clientX;
offsetY=dragItem.offsetTop - e.clientY;
});

document.addEventListener("mouseup",function(){ isDown=false; });

document.addEventListener("mousemove",function(e){
if(!isDown) return;
dragItem.style.left=(e.clientX + offsetX)+"px";
dragItem.style.top=(e.clientY + offsetY)+"px";
dragItem.style.bottom="auto";
dragItem.style.right="auto";
});

</script>

</body>
</html>
