<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jenn AI PRO</title>

<style>
body{margin:0;font-family:Inter,Arial;background:#eef2f7;}

#openBtn{
position:fixed;bottom:20px;right:20px;width:80px;height:80px;
border-radius:50%;overflow:hidden;cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
#openBtn img{width:100%;height:100%;object-fit:cover;}

#widget{
position:fixed;bottom:20px;right:20px;width:420px;height:700px;
background:white;border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.35);
display:none;flex-direction:column;
}

.header{
background:linear-gradient(135deg,#0f4c81,#3a7bd5);
color:white;padding:14px;font-weight:bold;
display:flex;justify-content:space-between;
}

.chat{
flex:1;padding:12px;overflow:auto;
display:flex;flex-direction:column;gap:10px;
}

.msg{
padding:10px 14px;border-radius:16px;max-width:85%;
white-space:pre-line;font-size:14px;
}
.user{background:#e3f2fd;align-self:flex-end;}
.ai{background:#f1f3f6;align-self:flex-start;}

.riskBox{
background:#fff3cd;
border-left:5px solid #ff9800;
padding:10px;font-size:13px;
margin:8px;border-radius:10px;
white-space:pre-line;
}

.loader{
text-align:center;
font-size:13px;
color:#888;
padding:6px;
}

.inputArea{padding:10px;border-top:1px solid #eee;}

textarea{
width:100%;height:70px;border-radius:12px;
padding:10px;resize:none;font-size:14px;
}

.btnRow{display:flex;gap:6px;margin-top:6px;}

button{
flex:1;border:none;border-radius:12px;
padding:9px;font-weight:bold;cursor:pointer;
}

.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">
<img src="https://i.postimg.cc/hjzSWJd0/jennai.png">
</div>

<div id="widget">
<div class="header">
<span>Jenn AI PRO</span>
<span onclick="closeWidget()">✖</span>
</div>

<div id="riskPanel"></div>
<div class="chat" id="chat"></div>
<div id="loader" class="loader"></div>

<div class="inputArea">
<textarea id="input" placeholder="Pflege eingeben..."></textarea>

<div class="btnRow">
<button class="generate" onclick="generate()">Generieren</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>
</div>
</div>

<script>

/* ================= CONFIG ================= */
const API_KEY = "HIER_DEIN_API_KEY"; // später in Desktop-App verstecken

/* ================= UI ================= */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const chat=document.getElementById("chat");
const riskPanel=document.getElementById("riskPanel");
const loader=document.getElementById("loader");

let lastOutput="";

function openWidget(){
widget.style.display="flex";
openBtn.style.display="none";
}

function closeWidget(){
widget.style.display="none";
openBtn.style.display="block";
}

function addMessage(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* ENTER SENDEN */
input.addEventListener("keydown", function(e){
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault();
generate();
}
});

/* ================= RISIKEN ================= */
function detectRisks(t){
t=t.toLowerCase();
let r=[];

if(/unruhig|irrt|weglaufen|läuft/.test(t)) r.push("Sturzrisiko");
if(/trink|flüssigkeit/.test(t) && /(nicht|wenig|kaum|reduziert)/.test(t)) r.push("Dehydratation");
if(/ess|verweig|nahrung/.test(t)) r.push("Mangelernährung");
if(/schmerz/.test(t)) r.push("Schmerzbelastung");
if(/stuhl|urin|inkontinenz/.test(t)) r.push("Hautschädigung");
if(/rötung|wunde|dekubitus/.test(t)) r.push("Dekubitusrisiko");

return [...new Set(r)];
}

/* ================= KI ================= */
async function smartAI(text){

try{
const response = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + API_KEY
},
body: JSON.stringify({
model: "gpt-4o-mini",
messages: [
{
role: "system",
content: `
Du bist eine diplomierte Pflegefachkraft.

Aufgabe:
Erstelle professionelle Pflegedokumentation.

Regeln:
- sachlich
- kurz
- medizinisch korrekt
- keine Erklärungen
- keine Wiederholungen
- nur Beobachtung + Zustand
- deutscher Pflege-Standard
`
},
{
role: "user",
content: text
}
]
})
});

const data = await response.json();

if(data.choices && data.choices.length){
return data.choices[0].message.content;
}else{
throw new Error("API Fehler");
}

}catch(e){
return fallbackAI(text);
}

}

/* ================= FALLBACK KI ================= */
function fallbackAI(text){

text=text.toLowerCase();
let s=[];

if(/schlecht|müde/.test(text))
s.push("Der Allgemeinzustand wirkte reduziert.");

if(/verwirrt/.test(text))
s.push("Der Bewohner war desorientiert.");

if(/unruhig|läuft/.test(text))
s.push("Motorische Unruhe wurde beobachtet.");

if(/schmerz/.test(text))
s.push("Der Bewohner äußerte Schmerzen.");

if(/trink/.test(text))
s.push("Die Trinkmenge war reduziert.");

if(/isst/.test(text))
s.push("Die Nahrungsaufnahme war vermindert.");

if(!s.length)
return "Keine relevanten Auffälligkeiten.";

return s.join(" ");
}

/* ================= GENERATE ================= */
async function generate(){

let raw=input.value.trim();
if(!raw) return;

addMessage(raw,"user");

/* RISIKEN */
let risks=detectRisks(raw);
riskPanel.innerHTML="";

if(risks.length){
let box=document.createElement("div");
box.className="riskBox";
box.innerText="⚠ Risiken:\n"+risks.join("\n");
riskPanel.appendChild(box);
}

/* LOADER */
loader.innerText="KI analysiert...";

/* KI */
let result = await smartAI(raw);

/* MASSNAHMEN AUTO */
let full = result + "\n\nMaßnahmen: Beobachtung, Flüssigkeitsangebot, Sturzprophylaxe.";

/* OUTPUT */
loader.innerText="";
addMessage(full,"ai");

lastOutput=full;
input.value="";
}

/* ================= COPY ================= */
function copyText(){
if(!lastOutput) return;
navigator.clipboard.writeText(lastOutput);
alert("Text kopiert");
}

/* ================= RESET ================= */
function resetAll(){
chat.innerHTML="";
input.value="";
lastOutput="";
riskPanel.innerHTML="";
loader.innerText="";
}

</script>

</body>
</html>
