<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Pflegeassistenz</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
#openBtn{position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;}
#widget{
position:fixed;bottom:20px;right:20px;width:560px;height:700px;
background:white;border-radius:12px;box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;flex-direction:column;
}
.header{background:#0f4c81;color:white;padding:12px;display:flex;justify-content:space-between;}
.content{padding:12px;flex:1;overflow:auto;}
textarea{width:100%;height:140px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:bold;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header">
<span>JennAI – Pflegebericht PRO</span>
<span onclick="closeWidget()">✖</span>
</div>

<div class="content">
<textarea id="input" placeholder="Freitext..."></textarea>
<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Kopieren</button>
<button class="reset" onclick="resetAll()">Reset</button>
<textarea id="output"></textarea>
</div>
</div>

<script>

/* DOM */
const widget=document.getElementById("widget");
const openBtn=document.getElementById("openBtn");
const input=document.getElementById("input");
const output=document.getElementById("output");

/* UI */
function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

/* ================= SYNONYM ENGINE ================= */

const patterns = [

/* Zustand */
{regex: /(az|zustand).*(schlecht|mies|sehr schwach|kritisch)/, text:"Der Allgemeinzustand zeigte sich deutlich reduziert", risk:"kritisch"},
{regex: /(müde|schläfrig|kaum wach)/, text:"wirkte somnolent"},

/* Orientierung */
{regex: /(verwirrt|komisch drauf|anders als sonst)/, text:"wirkte desorientiert", risk:"Sturzrisiko"},
{regex: /(irrt herum|läuft herum|wandert|planlos)/, text:"motorisch unruhig mit Umhergehen", risk:"Sturzrisiko"},

/* Verhalten */
{regex: /(schreit|brüllt|laut)/, text:"es zeigten sich wiederholte Lautäußerungen"},
{regex: /(aggressiv|wehrt sich)/, text:"herausforderndes Verhalten"},

/* Pflege */
{regex: /(duschen|waschen).*(nicht|verweigert|will nicht)/, text:"Die angebotene Körperpflege wurde nicht angenommen"},

/* Essen & Trinken */
{regex: /(isst nichts|nicht gegessen|nimmt nichts an)/, text:"Die Nahrungsaufnahme wurde nicht angenommen", risk:"Mangelernährung"},
{regex: /(trinkt nichts|kaum getrunken|gar nichts getrunken)/, text:"Die Flüssigkeitsaufnahme war unzureichend", risk:"Dehydratation"},

/* Ausscheidung */
{regex: /(stuhl.*verschmiert|eingekotet|stuhl überall)/, text:"Stuhlkontamination festgestellt", risk:"Hautschädigung"},
{regex: /(urin.*überall|eingenässt|nass)/, text:"Harninkontinenz festgestellt", risk:"Hautschädigung"},

/* Haut */
{regex: /(wunde|offene stelle)/, text:"Wunde vorhanden", risk:"Infektionsrisiko"},
{regex: /(rötung|rot)/, text:"Rötung beobachtet", risk:"Dekubitusrisiko"},

];

/* ================= PSEUDO KI ================= */
function localAI(text){

let sentences=[];
let risks=new Set();

patterns.forEach(p=>{
if(p.regex.test(text)){
sentences.push(p.text);
if(p.risk) risks.add(p.risk);
}
});

let result="";

if(sentences.length){
result = sentences.join(". ") + ". ";
}

if(risks.size){
result += "Es bestehen Risiken hinsichtlich " + [...risks].join(", ") + ".";
}

if(!result){
result="Keine relevanten Auffälligkeiten.";
}

return result;
}

/* ================= KI ================= */
async function hfAI(text){
try{
let res = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct",{
method:"POST",
headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:`
Schreibe einen professionellen Pflegebericht in Fachsprache:

${text}
`
})
});

let data = await res.json();
if(Array.isArray(data)){
return data[0]?.generated_text;
}

}catch(e){return null;}
}

/* ================= GENERATE ================= */
async function generate(){

let raw=input.value.toLowerCase();

/* sofort */
let local=localAI(raw);
output.value=local;

/* KI */
let ai=await hfAI(raw);

if(ai && ai.length>local.length){
output.value=ai;
}

}

/* TOOLS */
function copyText(){navigator.clipboard.writeText(output.value);}
function resetAll(){input.value="";output.value="";}

</script>

</body>
</html>
