<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>JennAI – Digitale Pflegeassistenz</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}
#openBtn{position:fixed;bottom:20px;right:20px;font-size:48px;cursor:pointer;}
#widget{
position:fixed;bottom:20px;right:20px;width:520px;height:640px;
background:white;border-radius:12px;box-shadow:0 15px 40px rgba(0,0,0,0.3);
display:none;flex-direction:column;
}
.header{background:#0f4c81;color:white;padding:12px;display:flex;justify-content:space-between;cursor:move;}
.content{padding:12px;flex:1;overflow:auto;}
textarea{width:100%;height:140px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #ccc;}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;}
.generate{background:#0f4c81;color:white;}
.copy{background:#27ae60;color:white;}
.reset{background:#c0392b;color:white;}
</style>
</head>

<body>

<div id="openBtn" onclick="openWidget()">👩‍⚕️</div>

<div id="widget">
<div class="header" id="dragHeader">
<span>JennAI – Digitale Pflegeassistenz</span>
<span onclick="closeWidget()" style="cursor:pointer;">✖</span>
</div>

<div class="content">

<textarea id="input" placeholder="Freitext eingeben..."></textarea>

<button class="generate" onclick="generate()">Bericht erstellen</button>
<button class="copy" onclick="copyText()">Bericht kopieren</button>
<button class="reset" onclick="resetAll()">Zurücksetzen</button>

<textarea id="output"></textarea>

</div>
</div>

<script>

/* ================= UI ================= */
function openWidget(){widget.style.display="flex";openBtn.style.display="none";}
function closeWidget(){widget.style.display="none";openBtn.style.display="block";}

/* ================= NLP CORE ================= */
function tokenize(text){
return text.toLowerCase().split(/[\s,.;:!?]+/);
}

function contains(tokens, words){
return words.some(w => tokens.some(t => t.startsWith(w)));
}

/* ================= GENERATOR ================= */
function generate(){

let raw = input.value;
let tokens = tokenize(raw);

let findings = [];
let risks = new Set();

/* ===== ZUSTAND ===== */
if(contains(tokens,["schlecht","kritisch","mies","schwach"])){
findings.push({text:"Der Allgemeinzustand zeigte sich deutlich reduziert",prio:1});
risks.add("Allgemeinzustand kritisch");
}

/* ===== TRINKEN ===== */
if(contains(tokens,["trink","flüssig"]) && contains(tokens,["nicht","kein","verweig"])){
findings.push({text:"die Flüssigkeitsaufnahme wurde verweigert",prio:1});
risks.add("Dehydratationsrisiko");
}
else if(contains(tokens,["wenig","kaum"]) && contains(tokens,["trink"])){
findings.push({text:"die Trinkmenge war reduziert",prio:2});
risks.add("Dehydratationsrisiko");
}

/* ===== ESSEN ===== */
if(contains(tokens,["ess"]) && contains(tokens,["nicht","kein","verweig"])){
findings.push({text:"die Nahrungsaufnahme erfolgte nicht",prio:1});
risks.add("Mangelernährung");
}

/* ===== HARN ===== */
if(contains(tokens,["nass","urin","eingenaesst","eingenässt"])){
findings.push({text:"es zeigte sich eine Harninkontinenz",prio:1});
risks.add("Hautschädigung");
}

/* ===== STUHL ===== */
if(contains(tokens,["stuhl","kot"]) && contains(tokens,["verschmiert","überall","eingekotet"])){
findings.push({text:"es zeigte sich eine Stuhlkontamination",prio:1});
risks.add("Hautschädigung");
}

/* ===== MOBILITÄT ===== */
if(contains(tokens,["unsicher","wackelig","sturz"])){
findings.push({text:"die Mobilität zeigte sich unsicher",prio:2});
risks.add("Sturzrisiko");
}

/* ===== VERHALTEN ===== */
if(contains(tokens,["verwirrt","komisch","anders","durcheinander"])){
findings.push({text:"Bewohner/in wirkte desorientiert",prio:2});
}

/* ===== ATMUNG ===== */
if(contains(tokens,["atem","luft"]) && contains(tokens,["not","schlecht"])){
findings.push({text:"Atemnot wurde beobachtet",prio:1});
risks.add("akute Verschlechterung");
}

/* ===== HAUT ===== */
if(contains(tokens,["wunde","offen"])){
findings.push({text:"eine Wunde war vorhanden",prio:1});
risks.add("Infektionsrisiko");
}

/* ===== PRIORISIERUNG ===== */
findings.sort((a,b)=>a.prio-b.prio);

/* ===== TEXT GENERIERUNG ===== */
let text="";

if(findings.length){

// erster Satz
text = findings[0].text;

// weitere Sätze
for(let i=1;i<findings.length;i++){
text += ", " + findings[i].text;
}

text += ".";

}else{
text="Es zeigten sich keine relevanten Auffälligkeiten.";
}

/* ===== RISIKEN ===== */
if(risks.size){
text += " Es bestehen Risiken hinsichtlich " + [...risks].join(", ") + ".";
}

/* ===== OUTPUT ===== */
output.value = text.charAt(0).toUpperCase()+text.slice(1);

}

/* ================= COPY ================= */
function copyText(){
navigator.clipboard.writeText(output.value);
alert("Bericht kopiert");
}

/* ================= RESET ================= */
function resetAll(){
input.value="";
output.value="";
}

/* ================= DRAG ================= */
let offsetX, offsetY, isDown=false;

dragHeader.addEventListener("mousedown",function(e){
isDown=true;
offsetX=widget.offsetLeft - e.clientX;
offsetY=widget.offsetTop - e.clientY;
});
document.addEventListener("mouseup",()=>isDown=false);
document.addEventListener("mousemove",function(e){
if(!isDown) return;
widget.style.left=(e.clientX + offsetX)+"px";
widget.style.top=(e.clientY + offsetY)+"px";
widget.style.bottom="auto";
widget.style.right="auto";
});

</script>

</body>
</html>
